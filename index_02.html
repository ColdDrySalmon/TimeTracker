<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracker</title>
<style>
  :root {
    --bg:#ffffff;--bg2:#f5f5f3;--bg3:#e8e8e5;
    --text:#1a1a1a;--text2:#666;--text3:#aaa;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
    --radius:10px;--radius-lg:14px;
    --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1c;--bg2:#252525;--bg3:#303030;
      --text:#f0f0f0;--text2:#999;--text3:#555;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  #app{max-width:520px;margin:0 auto;padding:2rem 1.25rem 5rem;}
  button{font-family:inherit;cursor:pointer;}
  input{font-family:inherit;}
  .input{font-size:14px;padding:9px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);width:100%;outline:none;}
  .input:focus{border-color:var(--text3);box-shadow:0 0 0 3px rgba(128,128,128,0.1);}
  .input::placeholder{color:var(--text3);}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
  .topbar-title{font-size:17px;font-weight:500;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .sync-status{font-size:12px;color:var(--text3);}
  .sync-status.syncing{color:#EF9F27;}
  .sync-status.error{color:#E24B4A;}
  .sync-status.ok{color:#1D9E75;}
  .icon-btn{background:transparent;border:none;padding:4px 8px;border-radius:var(--radius);color:var(--text3);font-size:16px;line-height:1;}
  .icon-btn:hover{color:var(--text2);background:var(--bg2);}
  .nav{display:flex;gap:8px;margin-bottom:1.5rem;}
  .nav-btn{padding:5px 16px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;}
  .nav-btn.active{background:var(--bg2);color:var(--text);}
  .active-display{padding:1.25rem 1.5rem;border-radius:var(--radius-lg);background:var(--bg2);margin-bottom:1rem;border:0.5px solid var(--border);border-left-width:3px;}
  .active-label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);margin-bottom:4px;}
  .active-timer{font-size:44px;font-family:var(--mono);font-weight:500;letter-spacing:-0.03em;line-height:1.1;}
  .active-tag-badge{display:inline-block;margin-top:8px;padding:3px 10px;border-radius:20px;background:var(--bg3);font-size:12px;color:var(--text2);}
  .tag-panel{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;}
  .tag-panel-title{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:10px;}
  .tag-input-row{display:flex;gap:8px;margin-bottom:10px;}
  .tag-input-row .input{flex:1;}
  .tag-set-btn{padding:0 16px;height:38px;border-radius:var(--radius);border:none;background:var(--text);color:var(--bg);font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;}
  .tag-set-btn:hover{opacity:0.85;}
  .tag-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .tag-chip{padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;}
  .tag-chip:hover{background:var(--bg3);color:var(--text);}
  .tag-chip.active-tag{background:var(--bg3);color:var(--text);}
  .cat-list{display:flex;flex-direction:column;gap:8px;}
  .cat-row{display:flex;align-items:stretch;gap:8px;}
  .cat-btn{flex:1;display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-radius:var(--radius-lg);border:0.5px solid var(--border);border-left-width:4px;background:transparent;color:var(--text);text-align:left;font-size:17px;font-weight:400;}
  .cat-btn:hover{background:var(--bg2);}
  .cat-btn.active{background:var(--bg2);font-weight:500;}
  .cat-btn-right{display:flex;align-items:center;gap:10px;}
  .cat-hint{font-size:12px;color:var(--text3);font-family:var(--mono);}
  .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .cat-remove{border:none;background:transparent;color:var(--text3);font-size:20px;padding:6px 8px;border-radius:var(--radius);line-height:1;flex-shrink:0;align-self:center;}
  .cat-remove:hover{color:var(--text2);background:var(--bg2);}
  .add-wrap{margin-top:12px;}
  .add-link{background:transparent;border:none;font-size:13px;color:var(--text3);padding:0;}
  .add-link:hover{color:var(--text2);}
  .add-row{display:flex;gap:8px;margin-top:4px;}
  .sm-btn{padding:0 14px;height:38px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text);font-size:13px;white-space:nowrap;}
  .period-tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .period-btn{padding:5px 13px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;}
  .period-btn.active{background:var(--bg2);color:var(--text);}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
  .summary-card{padding:1rem;border-radius:var(--radius);background:var(--bg2);}
  .summary-label{font-size:12px;color:var(--text2);margin-bottom:4px;}
  .summary-val{font-size:24px;font-family:var(--mono);font-weight:500;}
  .pie-wrap{display:flex;align-items:center;gap:1.5rem;margin-bottom:2rem;padding:1.25rem;background:var(--bg2);border-radius:var(--radius-lg);}
  .pie-legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:0;}
  .pie-legend-item{display:flex;align-items:center;gap:8px;font-size:13px;}
  .pie-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
  .pie-legend-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
  .pie-legend-val{font-family:var(--mono);font-size:12px;color:var(--text2);}
  .cat-bars{display:flex;flex-direction:column;gap:16px;margin-bottom:2rem;}
  .bar-head{display:flex;justify-content:space-between;margin-bottom:5px;font-size:14px;}
  .bar-pct{font-size:12px;color:var(--text3);margin-left:6px;}
  .bar-val{font-family:var(--mono);color:var(--text2);font-size:14px;}
  .bar-track{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-bottom:8px;}
  .bar-fill{height:100%;border-radius:3px;}
  .tag-breakdown{display:flex;flex-direction:column;gap:4px;padding-left:8px;}
  .tag-breakdown-item{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);}
  .tag-breakdown-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px;}
  .tag-breakdown-val{font-family:var(--mono);flex-shrink:0;}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);margin-bottom:10px;}
  .session-list{display:flex;flex-direction:column;gap:5px;}
  .session-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);border:0.5px solid var(--border);border-left-width:3px;}
  .session-main{flex:1;min-width:0;}
  .session-name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .session-time{font-size:12px;color:var(--text2);}
  .session-dur{font-size:13px;font-family:var(--mono);color:var(--text2);flex-shrink:0;}
  .empty{color:var(--text3);font-size:14px;padding:2rem 0;text-align:center;}
  .setup-card{padding:1.5rem;border-radius:var(--radius-lg);border:0.5px solid var(--border2);margin-bottom:1rem;}
  .setup-title{font-size:16px;font-weight:500;margin-bottom:8px;}
  .setup-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1rem;}
  .setup-desc a{color:var(--text);}
  .setup-field{margin-bottom:10px;}
  .setup-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;}
  .setup-actions{display:flex;gap:8px;margin-top:1rem;}
  .primary-btn{padding:9px 18px;border-radius:var(--radius);border:none;background:var(--text);color:var(--bg);font-size:14px;font-weight:500;}
  .primary-btn:hover{opacity:0.85;}
  .primary-btn:disabled{opacity:0.4;cursor:default;}
  .danger-btn{padding:9px 18px;border-radius:var(--radius);border:0.5px solid #E24B4A44;background:transparent;color:#E24B4A;font-size:14px;}
  .msg{font-size:13px;margin-top:10px;padding:8px 12px;border-radius:var(--radius);}
  .msg.error{background:#E24B4A18;color:#E24B4A;}
  .msg.ok{background:#1D9E7518;color:#1D9E75;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CAT_COLORS=["#378ADD","#EF9F27","#1D9E75","#D85A30","#7F77DD","#D4537E","#639922","#E24B4A"];
const DEFAULT_CATS=[
  {id:"work",name:"Work",color:"#378ADD"},
  {id:"maintenance",name:"Maintenance",color:"#EF9F27"},
  {id:"fitness",name:"Fitness",color:"#1D9E75"},
  {id:"family",name:"Family",color:"#D85A30"},
  {id:"leisure",name:"Leisure",color:"#7F77DD"},
];
const LKEY="tt-v2",GKEY="tt-gist",TKEY="tt-token",GIST_FILE="time-tracker-data.json";

let data={categories:[...DEFAULT_CATS],sessions:[],activeSession:null};
let view="tracker",period="today",showSettings=false,addingCat=false;
let syncState="idle",syncMsg="",saveTimer=null;
let token="",gistId="";

function localSave(d){try{localStorage.setItem(LKEY,JSON.stringify(d));}catch{}}
function localLoad(){try{const s=localStorage.getItem(LKEY);if(s)return JSON.parse(s);}catch{}return null;}

function gh(){return{"Authorization":"token "+token,"Content-Type":"application/json"};}
async function gistLoad(id){
  const r=await fetch("https://api.github.com/gists/"+id,{headers:gh()});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json(),c=d.files[GIST_FILE]?.content;
  if(!c)throw new Error("File not found");
  return JSON.parse(c);
}
async function gistSave(id,d){
  const r=await fetch("https://api.github.com/gists/"+id,{method:"PATCH",headers:gh(),body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(d)}}})});
  if(!r.ok)throw new Error("HTTP "+r.status);
}
async function gistCreate(d){
  const r=await fetch("https://api.github.com/gists",{method:"POST",headers:gh(),body:JSON.stringify({description:"time-tracker-data",public:false,files:{[GIST_FILE]:{content:JSON.stringify(d)}}})});
  if(!r.ok)throw new Error("HTTP "+r.status);
  return(await r.json()).id;
}
async function findOrCreateGist(){
  const r=await fetch("https://api.github.com/gists?per_page=100",{headers:gh()});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const list=await r.json(),ex=list.find(g=>g.description==="time-tracker-data"&&g.files[GIST_FILE]);
  return ex?ex.id:await gistCreate(data);
}

async function syncLoad(){
  if(!token||!gistId)return;
  try{setSyncState("syncing","Loading…");render();data=await gistLoad(gistId);localSave(data);setSyncState("ok","Synced");render();}
  catch(e){setSyncState("error","Load failed: "+e.message);render();}
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(pushSave,800);}
async function pushSave(){
  if(!token||!gistId){localSave(data);return;}
  try{setSyncState("syncing","Saving…");updateSyncLabel();await gistSave(gistId,data);localSave(data);setSyncState("ok","Saved");updateSyncLabel();}
  catch(e){setSyncState("error","Save failed");updateSyncLabel();}
}
function setSyncState(s,msg){syncState=s;syncMsg=msg;}
function updateSyncLabel(){
  const el=document.getElementById("sync-label");if(!el)return;
  el.textContent={idle:"",syncing:"Syncing…",ok:"Saved",error:syncMsg}[syncState]||"";
  el.className="sync-status "+({idle:"",syncing:"syncing",ok:"ok",error:"error"}[syncState]||"");
}

function getTagPool(){
  const tags=new Set();
  data.sessions.forEach(s=>{if(s.tag?.trim())tags.add(s.tag.trim());});
  if(data.activeSession?.tag)tags.add(data.activeSession.tag.trim());
  return[...tags].sort((a,b)=>a.localeCompare(b));
}

function startCat(id){
  const now=Date.now(),sessions=[...data.sessions];
  if(data.activeSession)sessions.push({id:"s"+now,categoryId:data.activeSession.categoryId,tag:data.activeSession.tag||"",startTime:data.activeSession.startTime,endTime:now});
  data=data.activeSession?.categoryId===id?{...data,sessions,activeSession:null}:{...data,sessions,activeSession:{categoryId:id,tag:"",startTime:now}};
  scheduleSave();render();
  if(data.activeSession)setTimeout(()=>document.getElementById("tag-in")?.focus(),40);
}
function submitTag(){
  const val=document.getElementById("tag-in")?.value?.trim()||"";
  if(!data.activeSession)return;
  data={...data,activeSession:{...data.activeSession,tag:val}};
  scheduleSave();
  const badge=document.getElementById("active-tag-badge");
  const wrap=document.getElementById("active-tag-badge-wrap");
  if(badge)badge.textContent=val;
  if(wrap)wrap.style.display=val?"":"none";
  document.querySelectorAll(".tag-chip").forEach(el=>el.classList.toggle("active-tag",el.dataset.tag===val));
}
function setTagFromChip(tag){
  const input=document.getElementById("tag-in");
  if(input)input.value=tag;
  if(!data.activeSession)return;
  data={...data,activeSession:{...data.activeSession,tag}};
  scheduleSave();
  const badge=document.getElementById("active-tag-badge");
  const wrap=document.getElementById("active-tag-badge-wrap");
  if(badge)badge.textContent=tag;
  if(wrap)wrap.style.display=tag?"":"none";
  document.querySelectorAll(".tag-chip").forEach(el=>el.classList.toggle("active-tag",el.dataset.tag===tag));
}
function removeCat(id){
  const active=data.activeSession?.categoryId===id?null:data.activeSession;
  data={...data,categories:data.categories.filter(c=>c.id!==id),activeSession:active};
  scheduleSave();render();
}
function addCat(name){
  if(!name.trim())return;
  data={...data,categories:[...data.categories,{id:"c"+Date.now(),name:name.trim(),color:CAT_COLORS[data.categories.length%CAT_COLORS.length]}]};
  scheduleSave();render();
}

function dayKey(ts){return new Date(ts).toDateString();}
function getSessions(p){
  const all=[...data.sessions];
  if(data.activeSession)all.push({...data.activeSession,endTime:Date.now()});
  const now=new Date();
  return all.filter(s=>{
    const d=new Date(s.startTime);
    if(p==="today")return dayKey(s.startTime)===dayKey(Date.now());
    if(p==="week"){const w=new Date(now);w.setDate(now.getDate()-7);return d>=w;}
    if(p==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(p==="year")return d.getFullYear()===now.getFullYear();
    return true;
  });
}
function getStats(p){
  const sessions=getSessions(p),stats={};
  data.categories.forEach(c=>{stats[c.id]=0;});
  sessions.forEach(s=>{if(s.categoryId in stats)stats[s.categoryId]+=(s.endTime-s.startTime);});
  return stats;
}
function getTagStats(p,catId){
  const stats={};
  getSessions(p).filter(s=>s.categoryId===catId&&s.tag?.trim()).forEach(s=>{stats[s.tag]=(stats[s.tag]||0)+(s.endTime-s.startTime);});
  return Object.entries(stats).sort((a,b)=>b[1]-a[1]);
}
function getDailyAvg(p){
  if(p==="today")return null;
  const sessions=getSessions(p);if(!sessions.length)return null;
  const days=new Set(sessions.map(s=>dayKey(s.startTime)));
  return sessions.reduce((a,s)=>a+(s.endTime-s.startTime),0)/days.size;
}

function fmt(sec){
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  if(h>0)return`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return`${m}:${String(s).padStart(2,"0")}`;
}
function fmtMs(ms){
  if(ms<60000)return`${Math.round(ms/1000)}s`;
  const h=ms/3600000;
  return h<1?`${Math.round(ms/60000)}m`:`${h.toFixed(1)}h`;
}
function e(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function makePie(slices,size){
  const total=slices.reduce((a,s)=>a+s.v,0);
  if(!total)return`<circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="var(--bg3)"/>`;
  const cx=size/2,cy=size/2,r=size/2-2;
  let angle=-Math.PI/2,paths="";
  slices.filter(s=>s.v>0).forEach(s=>{
    const sweep=(s.v/total)*Math.PI*2;
    if(sweep<0.001)return;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    paths+=`<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${sweep>Math.PI?1:0},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${s.color}"/>`;
  });
  return paths;
}

function renderTracker(){
  const ac=data.activeSession?data.categories.find(c=>c.id===data.activeSession.categoryId):null;
  const elapsed=data.activeSession?Math.floor((Date.now()-data.activeSession.startTime)/1000):0;
  const currentTag=data.activeSession?.tag||"";
  const pool=getTagPool();
  let h=`<div class="active-display" style="border-left-color:${ac?ac.color:"var(--border2)"}">`;
  if(ac){
    h+=`<div class="active-label">${e(ac.name)}</div>`;
    h+=`<div class="active-timer" id="timer-display">${fmt(elapsed)}</div>`;
    h+=`<div id="active-tag-badge-wrap" style="display:${currentTag?"":"none"}"><span class="active-tag-badge" id="active-tag-badge">${e(currentTag)}</span></div>`;
  }else{
    h+=`<div class="active-label">No active timer</div>`;
    h+=`<div class="active-timer" style="color:var(--text3)">–:––</div>`;
  }
  h+=`</div>`;
  if(ac){
    h+=`<div class="tag-panel"><div class="tag-panel-title">Tag this session</div>`;
    h+=`<div class="tag-input-row"><input class="input" id="tag-in" type="text" placeholder="e.g. Game dev, Weight lifting…" value="${e(currentTag)}" onkeydown="if(event.key==='Enter')submitTag()"><button class="tag-set-btn" onclick="submitTag()">Set</button></div>`;
    if(pool.length>0){
      h+=`<div class="tag-chips">`;
      pool.forEach(tag=>{h+=`<button class="tag-chip${currentTag===tag?" active-tag":""}" data-tag="${e(tag)}" onclick="setTagFromChip('${e(tag)}')">${e(tag)}</button>`;});
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  h+=`<div class="cat-list">`;
  data.categories.forEach(cat=>{
    const isActive=data.activeSession?.categoryId===cat.id;
    h+=`<div class="cat-row"><button class="cat-btn${isActive?" active":""}" style="border-left-color:${cat.color}" onclick="startCat('${cat.id}')"><span style="font-weight:${isActive?500:400}">${e(cat.name)}</span><div class="cat-btn-right">${isActive?`<span class="cat-hint">stop</span>`:""}<span class="cat-dot" style="background:${cat.color}"></span></div></button><button class="cat-remove" onclick="removeCat('${cat.id}')">×</button></div>`;
  });
  h+=`</div><div class="add-wrap">`;
  if(!addingCat){
    h+=`<button class="add-link" onclick="toggleAdd()">+ Add category</button>`;
  }else{
    h+=`<div class="add-row"><input class="input" id="new-cat" placeholder="Category name" onkeydown="newCatKey(event)" style="flex:1"><button class="sm-btn" onclick="submitCat()">Add</button><button class="sm-btn" onclick="toggleAdd()">Cancel</button></div>`;
  }
  h+=`</div>`;
  return h;
}

function renderInsights(){
  const stats=getStats(period);
  const sessions=getSessions(period);
  const total=Object.values(stats).reduce((a,b)=>a+b,0);
  const sorted=data.categories.map(c=>({...c,ms:stats[c.id]||0})).sort((a,b)=>b.ms-a.ms);
  const avg=getDailyAvg(period);
  const periods=["today","week","month","year","all time"];
  let h=`<div class="period-tabs">`;
  periods.forEach(p=>{h+=`<button class="period-btn${period===p?" active":""}" onclick="setPeriod('${p}')">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`;});
  h+=`</div>`;
  h+=`<div class="summary-grid"><div class="summary-card"><div class="summary-label">${period==="today"?"today's total":"total tracked"}</div><div class="summary-val">${total>0?fmtMs(total):"–"}</div></div>`;
  if(avg)h+=`<div class="summary-card"><div class="summary-label">daily avg</div><div class="summary-val">${fmtMs(avg)}</div></div>`;
  h+=`</div>`;
  if(total>0){
    const size=120;
    h+=`<div class="pie-wrap"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0;border-radius:50%;overflow:hidden">${makePie(sorted.map(c=>({v:c.ms,color:c.color})),size)}</svg><div class="pie-legend">`;
    sorted.filter(c=>c.ms>0).forEach(c=>{h+=`<div class="pie-legend-item"><span class="pie-swatch" style="background:${c.color}"></span><span class="pie-legend-name">${e(c.name)}</span><span class="pie-legend-val">${Math.round(c.ms/total*100)}%</span></div>`;});
    h+=`</div></div>`;
  }
  h+=`<div class="cat-bars">`;
  sorted.forEach(cat=>{
    const pct=total>0?Math.round(cat.ms/total*100):0;
    const tagStats=getTagStats(period,cat.id);
    h+=`<div><div class="bar-head"><span>${e(cat.name)}${cat.ms>0?`<span class="bar-pct">${pct}%</span>`:""}</span><span class="bar-val">${cat.ms>0?fmtMs(cat.ms):"–"}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>`;
    if(tagStats.length>0){
      h+=`<div class="tag-breakdown">`;
      tagStats.forEach(([tag,ms])=>{h+=`<div class="tag-breakdown-item"><span class="tag-breakdown-name">↳ ${e(tag)}</span><span class="tag-breakdown-val">${fmtMs(ms)}</span></div>`;});
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  if(sessions.length>0){
    h+=`<div class="section-label">Recent</div><div class="session-list">`;
    sessions.slice(-20).reverse().forEach(s=>{
      const cat=data.categories.find(c=>c.id===s.categoryId);if(!cat)return;
      const dur=Math.floor((s.endTime-s.startTime)/1000);
      const d=new Date(s.startTime);
      const t=period==="today"?d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):`${d.toLocaleDateString([],{month:"short",day:"numeric"})} · ${d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}`;
      h+=`<div class="session-item" style="border-left-color:${cat.color}"><div class="session-main"><div class="session-name">${e(cat.name)}${s.tag?` · ${e(s.tag)}`:""}</div><div class="session-time">${t}</div></div><div class="session-dur">${fmt(dur)}</div></div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="empty">No sessions for this period</div>`;
  }
  return h;
}

function renderSettings(){
  const connected=!!(token&&gistId);
  let h=`<div class="setup-card"><div class="setup-title">GitHub sync</div>`;
  if(connected){
    h+=`<div class="setup-desc">Connected. Data syncs automatically via a private GitHub Gist.</div><div class="setup-field"><label>Gist ID</label><input class="input" value="${e(gistId)}" readonly style="font-family:var(--mono);font-size:12px;color:var(--text3)"></div><div class="setup-actions"><button class="sm-btn" onclick="syncLoad()">Sync now</button><button class="danger-btn" onclick="disconnect()">Disconnect</button></div>`;
  }else{
    h+=`<div class="setup-desc">Connect a GitHub account to sync data across devices. Stored in a <strong>private</strong> Gist — only you can see it.<br><br><strong>Steps:</strong><br>1. Go to <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens/new</a><br>2. Give it any name, e.g. "Time Tracker"<br>3. Under <em>Select scopes</em>, check <strong>gist</strong> only<br>4. Click "Generate token" and paste it below</div><div class="setup-field"><label>Personal Access Token</label><input class="input" id="tok-in" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"></div><div id="setup-msg"></div><div class="setup-actions"><button class="primary-btn" id="connect-btn" onclick="connectGitHub()">Connect</button></div>`;
  }
  return h+`</div>`;
}

function render(){
  const syncLabel={idle:"",syncing:"Syncing…",ok:"Saved",error:syncMsg}[syncState]||"";
  const syncClass={idle:"",syncing:"syncing",ok:"ok",error:"error"}[syncState]||"";
  let h=`<div class="topbar"><div class="topbar-title">Time Tracker</div><div class="topbar-right">`;
  if(token&&gistId&&!showSettings)h+=`<span class="sync-status ${syncClass}" id="sync-label">${syncLabel}</span>`;
  h+=`<button class="icon-btn" onclick="toggleSettings()">${showSettings?"←":"⚙"}</button></div></div>`;
  if(showSettings){document.getElementById("app").innerHTML=h+renderSettings();return;}
  h+=`<div class="nav">`;
  ["tracker","insights"].forEach(v=>{h+=`<button class="nav-btn${view===v?" active":""}" onclick="setView('${v}')">${v.charAt(0).toUpperCase()+v.slice(1)}</button>`;});
  h+=`</div>`;
  h+=view==="tracker"?renderTracker():renderInsights();
  document.getElementById("app").innerHTML=h;
}

function setView(v){view=v;render();}
function setPeriod(p){period=p;render();}
function toggleSettings(){showSettings=!showSettings;render();}
function toggleAdd(){addingCat=!addingCat;render();if(addingCat)setTimeout(()=>document.getElementById("new-cat")?.focus(),30);}
function submitCat(){const v=document.getElementById("new-cat")?.value||"";if(v.trim()){addCat(v);addingCat=false;}}
function newCatKey(ev){if(ev.key==="Enter")submitCat();if(ev.key==="Escape"){addingCat=false;render();}}

async function connectGitHub(){
  const tok=document.getElementById("tok-in")?.value?.trim();
  const msg=document.getElementById("setup-msg"),btn=document.getElementById("connect-btn");
  if(!tok){msg.innerHTML=`<div class="msg error">Please enter a token.</div>`;return;}
  btn.disabled=true;btn.textContent="Connecting…";
  try{
    token=tok;gistId=await findOrCreateGist();
    localStorage.setItem(TKEY,token);localStorage.setItem(GKEY,gistId);
    await syncLoad();showSettings=false;render();
  }catch(ex){
    token="";gistId="";
    msg.innerHTML=`<div class="msg error">Failed: ${e(ex.message)}. Check your token.</div>`;
    btn.disabled=false;btn.textContent="Connect";
  }
}
function disconnect(){
  if(!confirm("Disconnect GitHub sync? Local data stays but won't sync."))return;
  token="";gistId="";localStorage.removeItem(TKEY);localStorage.removeItem(GKEY);render();
}

// Tick: only update the clock display — never re-render the full page
setInterval(()=>{
  if(!data.activeSession||view!=="tracker"||showSettings)return;
  const el=document.getElementById("timer-display");
  if(el)el.textContent=fmt(Math.floor((Date.now()-data.activeSession.startTime)/1000));
},1000);

(function init(){
  const local=localLoad();if(local)data=local;
  token=localStorage.getItem(TKEY)||"";
  gistId=localStorage.getItem(GKEY)||"";
  if(token&&gistId)syncLoad();
  render();
})();
</script>
</body>
</html>
