<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracker</title>
<style>
:root{
  --bg:#ffffff;--bg2:#f4f4f1;--bg3:#e6e5e1;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.18);
  --radius:10px;--radius-lg:14px;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1b1b1b;--bg2:#242424;--bg3:#2e2e2e;
  --text:#f0f0f0;--text2:#888;--text3:#555;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
#shell{max-width:560px;margin:0 auto;padding:1.75rem 1.25rem 5rem;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
.inp{font-size:14px;padding:9px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);width:100%;outline:none;}
.inp:focus{border-color:var(--text3);box-shadow:0 0 0 3px rgba(128,128,128,0.1);}
.inp::placeholder{color:var(--text3);}

/* topbar */
#header{position:sticky;top:0;z-index:100;background:var(--bg);padding:1.75rem 1.25rem 0;max-width:560px;margin:0 auto;}
#shell{max-width:560px;margin:0 auto;padding:0 1.25rem 5rem;}
#topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.tb-title{font-size:16px;font-weight:500;letter-spacing:-0.01em;}
.tb-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--bg3);flex-shrink:0;transition:background 0.3s;}
.sync-dot.syncing{background:#EF9F27;}
.sync-dot.ok{background:#1D9E75;}
.sync-dot.error{background:#E24B4A;}
.icon-btn{background:transparent;border:none;padding:5px 8px;border-radius:8px;color:var(--text3);font-size:15px;line-height:1;}
.icon-btn:hover{color:var(--text2);background:var(--bg2);}

/* nav */
#nav{margin-bottom:1.5rem;}
#content{padding-top:1.25rem;}
.nav-shell{display:inline-flex;position:relative;background:var(--bg2);border-radius:var(--radius);padding:4px;}
.nav-bubble{position:absolute;top:4px;height:calc(100% - 8px);background:var(--bg);border-radius:7px;border:0.5px solid var(--border2);box-shadow:0 1px 4px rgba(0,0,0,0.08);transition:transform 0.22s cubic-bezier(0.4,0,0.2,1),width 0.22s cubic-bezier(0.4,0,0.2,1);pointer-events:none;z-index:0;}
.nav-tab{position:relative;z-index:1;padding:9px 22px;border:none;background:transparent;border-radius:7px;font-size:15px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:color 0.15s;}
.nav-tab.active{color:var(--text);font-weight:500;}

/* active display */
.active-display{padding:1.25rem 1.5rem;border-radius:var(--radius-lg);background:var(--bg2);margin-bottom:0.875rem;border:0.5px solid var(--border);border-left-width:4px;transition:border-left-color 0.2s;}
.active-label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:4px;}
.active-timer{font-size:46px;font-family:var(--mono);font-weight:500;letter-spacing:-0.03em;line-height:1.05;}
.active-timer.idle{color:var(--text3);}
.active-tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.a-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 7px 3px 10px;border-radius:20px;background:var(--bg3);font-size:12px;color:var(--text2);}
.a-chip-rm{border:none;background:transparent;color:var(--text3);font-size:14px;line-height:1;padding:0 2px;cursor:pointer;}
.a-chip-rm:hover{color:var(--text);}

/* tag panel */
.tag-add-btn{display:inline-block;background:transparent;border:0.5px dashed var(--border2);color:var(--text3);font-size:12px;padding:5px 12px;border-radius:20px;margin-bottom:0.875rem;}
.tag-add-btn:hover{color:var(--text2);border-color:var(--text3);}
/* recent tags quick-add row */
.recent-tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.recent-tag-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;}
.recent-tag-chip:hover{background:var(--bg2);color:var(--text);}
.recent-tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
/* tag filter in insights */
.tag-filter-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem;}
.tag-filter-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;}
.tag-filter-chip:hover{background:var(--bg2);color:var(--text);}
.tag-filter-chip.active{background:var(--bg3);color:var(--text);border-color:var(--border2);}
.tag-filter-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.filter-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);background:var(--bg2);border:0.5px solid var(--border);margin-bottom:1rem;font-size:13px;color:var(--text2);}
.filter-bar-tag{font-weight:500;color:var(--text);}
.filter-clear-btn{margin-left:auto;background:transparent;border:none;color:var(--text3);font-size:12px;padding:0;cursor:pointer;}
.filter-clear-btn:hover{color:var(--text2);}
/* tag viz section */
.tag-viz-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tag-viz-title{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);}
.viz-toggle{display:inline-flex;background:var(--bg2);border-radius:8px;padding:2px;gap:0;}
.viz-toggle-btn{padding:4px 12px;border:none;background:transparent;border-radius:6px;font-size:12px;color:var(--text3);cursor:pointer;}
.viz-toggle-btn.active{background:var(--bg);color:var(--text);border:0.5px solid var(--border2);}
/* tag bar chart */
.tag-bars{display:flex;flex-direction:column;gap:8px;margin-bottom:1.75rem;}
.tag-bar-row{display:flex;align-items:center;gap:10px;}
.tag-bar-label{font-size:12px;color:var(--text2);width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.tag-bar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tag-bar-track{flex:1;height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.tag-bar-fill{height:100%;border-radius:3px;}
.tag-bar-val{font-size:12px;font-family:var(--mono);color:var(--text2);flex-shrink:0;width:36px;text-align:right;}
/* tag pie */
.tag-pie-wrap{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:1.75rem;padding:1.25rem;background:var(--bg2);border-radius:var(--radius-lg);}
.tag-panel{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:0.875rem 1.125rem;margin-bottom:0.875rem;}
.tag-panel-title{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:8px;}
.tag-input-row{display:flex;gap:8px;margin-bottom:8px;}
.tag-input-row .inp{flex:1;}
.tag-set-btn{padding:0 16px;height:37px;border-radius:var(--radius);border:none;background:var(--text);color:var(--bg);font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.tag-set-btn:hover{opacity:0.85;}
.pool-chips{display:flex;flex-wrap:wrap;gap:5px;}
.pool-chip{padding:4px 11px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;}
.pool-chip:hover{background:var(--bg3);color:var(--text);}

/* category buttons */
.cat-list{display:flex;flex-direction:column;gap:8px;}
.cat-row{display:flex;align-items:stretch;gap:8px;}
.cat-btn{flex:1;display:flex;align-items:center;justify-content:space-between;padding:17px 20px;border-radius:var(--radius-lg);border:0.5px solid var(--border);border-left-width:4px;background:transparent;color:var(--text);text-align:left;font-size:17px;font-weight:400;transition:background 0.1s;}
.cat-btn:hover{background:var(--bg2);}
.cat-btn.active{background:var(--bg2);font-weight:500;}
.cat-btn-right{display:flex;align-items:center;gap:8px;}
.cat-hint{font-size:11px;color:var(--text3);font-family:var(--mono);}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cat-rm{border:none;background:transparent;color:var(--text3);font-size:19px;padding:6px 8px;border-radius:var(--radius);line-height:1;flex-shrink:0;align-self:center;}
.cat-rm:hover{color:var(--text);background:var(--bg2);}
.add-wrap{margin-top:12px;}
.add-link{background:transparent;border:none;font-size:13px;color:var(--text3);padding:0;}
.add-link:hover{color:var(--text2);}
.add-row{display:flex;gap:8px;margin-top:6px;}
.sm-btn{padding:0 14px;height:37px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text);font-size:13px;white-space:nowrap;}
.sm-btn:hover{background:var(--bg2);}

/* insights */
.period-row{display:flex;align-items:center;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
.period-btn{padding:5px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;}
.period-btn.active{background:var(--bg2);color:var(--text);}
.export-btn{margin-left:auto;padding:5px 11px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text3);font-size:12px;}
.export-btn:hover{color:var(--text2);background:var(--bg2);}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem;}
.sum-card{padding:1rem;border-radius:var(--radius);background:var(--bg2);}
.sum-label{font-size:12px;color:var(--text2);margin-bottom:3px;}
.sum-val{font-size:24px;font-family:var(--mono);font-weight:500;}
.pie-wrap{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.75rem;padding:1.25rem;background:var(--bg2);border-radius:var(--radius-lg);}
.pie-legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:0;}
.pie-li{display:flex;align-items:center;gap:8px;font-size:13px;}
.pie-sw{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.pie-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pie-val{font-family:var(--mono);font-size:12px;color:var(--text2);}
.cat-bars{display:flex;flex-direction:column;gap:16px;margin-bottom:1.75rem;}
.bar-head{display:flex;justify-content:space-between;margin-bottom:5px;font-size:14px;}
.bar-pct{font-size:12px;color:var(--text3);margin-left:5px;}
.bar-time{font-family:var(--mono);color:var(--text2);font-size:14px;}
.bar-track{height:4px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-bottom:6px;}
.bar-fill{height:100%;border-radius:3px;}
.tag-bk{display:flex;flex-direction:column;gap:3px;padding-left:10px;}
.tag-bk-item{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);}
.tag-bk-n{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;}
.tag-bk-v{font-family:var(--mono);flex-shrink:0;}
.sec-label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);margin-bottom:8px;}

/* session list */
.session-list{display:flex;flex-direction:column;gap:5px;margin-bottom:1.75rem;}
.s-item{border-radius:var(--radius);border:0.5px solid var(--border);border-left-width:3px;overflow:hidden;}
.s-head{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;user-select:none;}
.s-head:hover{background:var(--bg2);}
.s-main{flex:1;min-width:0;}
.s-name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.s-time{font-size:11px;color:var(--text3);}
.s-dur{font-size:13px;font-family:var(--mono);color:var(--text2);flex-shrink:0;}
.s-caret{font-size:9px;color:var(--text3);flex-shrink:0;margin-left:4px;}
.s-edit{padding:10px 12px 12px;border-top:0.5px solid var(--border);background:var(--bg2);}
.s-edit-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;min-height:24px;}
.s-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 7px 3px 10px;border-radius:20px;background:var(--bg3);font-size:12px;color:var(--text2);}
.s-chip-rm{border:none;background:transparent;color:var(--text3);font-size:13px;line-height:1;padding:0 2px;cursor:pointer;}
.s-chip-rm:hover{color:var(--text);}
.s-add-btn{background:transparent;border:0.5px dashed var(--border2);color:var(--text3);font-size:12px;padding:3px 10px;border-radius:20px;}
.s-add-btn:hover{color:var(--text2);}
.s-tag-row{display:flex;gap:6px;margin-top:6px;}
.s-tag-row .inp{flex:1;font-size:13px;padding:6px 10px;}
.s-pool-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.s-pool-chip{padding:3px 9px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;}
.s-pool-chip:hover{background:var(--bg3);}
.empty{color:var(--text3);font-size:14px;padding:2rem 0;text-align:center;}

/* manage page */
.manage-section{margin-bottom:2rem;}
.manage-section-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
.manage-section-title{font-size:16px;font-weight:500;}
.manage-section-desc{font-size:13px;color:var(--text3);margin-bottom:1.25rem;line-height:1.6;}
.tags-cat-block{margin-bottom:1.5rem;}
.tags-cat-hd{display:flex;align-items:center;gap:9px;margin-bottom:8px;padding-bottom:8px;border-bottom:0.5px solid var(--border);}
.tags-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.tags-cat-name{font-size:14px;font-weight:500;}
.tag-mgmt-list{display:flex;flex-direction:column;gap:4px;}
.tag-mgmt-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);border:0.5px solid var(--border);}
.tag-mgmt-name{flex:1;font-size:14px;}
.tag-mgmt-count{font-size:12px;color:var(--text3);font-family:var(--mono);flex-shrink:0;}
.tag-mgmt-del{border:none;background:transparent;color:var(--text3);font-size:16px;padding:2px 7px;border-radius:6px;line-height:1;flex-shrink:0;}
.tag-mgmt-del:hover{color:#E24B4A;background:rgba(226,75,74,0.1);}
.tag-mgmt-edit{border:none;background:transparent;color:var(--text3);font-size:13px;padding:2px 7px;border-radius:6px;line-height:1;flex-shrink:0;}
.tag-mgmt-edit:hover{color:var(--text2);background:var(--bg2);}
.tag-edit-row{display:flex;gap:6px;align-items:center;flex:1;}
.tag-edit-row .inp{flex:1;font-size:13px;padding:5px 9px;}
.tags-empty{font-size:13px;color:var(--text3);padding:2px 0 4px;}

/* settings */
.setup-card{padding:1.5rem;border-radius:var(--radius-lg);border:0.5px solid var(--border2);margin-bottom:1rem;}
.setup-title{font-size:16px;font-weight:500;margin-bottom:8px;}
.setup-desc{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:1rem;}
.setup-desc a{color:var(--text);}
.setup-field{margin-bottom:10px;}
.setup-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;}
.setup-actions{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
.primary-btn{padding:9px 18px;border-radius:var(--radius);border:none;background:var(--text);color:var(--bg);font-size:14px;font-weight:500;}
.primary-btn:hover{opacity:0.85;}
.primary-btn:disabled{opacity:0.4;cursor:default;}
.danger-btn{padding:9px 18px;border-radius:var(--radius);border:0.5px solid rgba(226,75,74,0.3);background:transparent;color:#E24B4A;font-size:14px;}
.fl-msg{font-size:13px;margin-top:10px;padding:8px 12px;border-radius:var(--radius);}
.fl-msg.error{background:rgba(226,75,74,0.08);color:#E24B4A;}
.fl-msg.ok{background:rgba(29,158,117,0.08);color:#1D9E75;}

/* desktop: bigger category buttons */
@media(min-width:600px){
  .cat-btn{padding:22px 24px;font-size:18px;}
  .cat-rm{font-size:21px;}
}
</style>
</head>
<body>
<div id="shell">
  <div id="header">
    <div id="topbar"></div>
    <div id="nav"></div>
  </div>
  <div id="content"></div>
</div>
<script>
// ── constants ──────────────────────────────────────────────────────────────
const CAT_COLORS=["#378ADD","#EF9F27","#1D9E75","#D85A30","#7F77DD","#D4537E","#639922","#E24B4A"];
const DEFAULT_CATS=[
  {id:"work",name:"Work",color:"#378ADD"},
  {id:"maintenance",name:"Maintenance",color:"#EF9F27"},
  {id:"fitness",name:"Fitness",color:"#1D9E75"},
  {id:"family",name:"Family",color:"#D85A30"},
  {id:"leisure",name:"Leisure",color:"#7F77DD"},
];
const LKEY="tt-v3",GKEY="tt-gist",TKEY="tt-token",GIST_FILE="time-tracker-data.json";
const TABS=["tracker","insights","manage"];

// ── state ──────────────────────────────────────────────────────────────────
// data.tagPools = { [catId]: string[] }
// session  = { id, categoryId, tags:string[], startTime, endTime }
// active   = { categoryId, tags:string[], startTime }
let data={categories:[...DEFAULT_CATS],sessions:[],activeSession:null,tagPools:{}};
let view="tracker",period="today";
let showSettings=false,addingCat=false,showTagInput=false;
let expandedSid=null,expandedAddingTag=false;
let activeTagFilter=null; // {catId, tag} | null
let tagViewMode="bar"; // "pie" | "bar"
let editingTag=null; // {catId, tag} | null
let syncState="idle",saveTimer=null;
let token="",gistId="";

// ── storage ────────────────────────────────────────────────────────────────
function lsave(d){try{localStorage.setItem(LKEY,JSON.stringify(d));}catch(e){}}
function lload(){try{const s=localStorage.getItem(LKEY);return s?JSON.parse(s):null;}catch(e){return null;}}

// ── gist sync ──────────────────────────────────────────────────────────────
const ghH=()=>({"Authorization":"token "+token,"Content-Type":"application/json"});
async function gLoad(id){
  const r=await fetch("https://api.github.com/gists/"+id,{headers:ghH()});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json(),c=d.files[GIST_FILE]?.content;
  if(!c)throw new Error("File not found");
  return JSON.parse(c);
}
async function gSave(id,d){
  const r=await fetch("https://api.github.com/gists/"+id,{method:"PATCH",headers:ghH(),body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(d)}}})});
  if(!r.ok)throw new Error("HTTP "+r.status);
}
async function gCreate(d){
  const r=await fetch("https://api.github.com/gists",{method:"POST",headers:ghH(),body:JSON.stringify({description:"time-tracker-data",public:false,files:{[GIST_FILE]:{content:JSON.stringify(d)}}})});
  if(!r.ok)throw new Error("HTTP "+r.status);
  return(await r.json()).id;
}
async function findOrCreate(){
  const r=await fetch("https://api.github.com/gists?per_page=100",{headers:ghH()});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const list=await r.json(),ex=list.find(g=>g.description==="time-tracker-data"&&g.files[GIST_FILE]);
  return ex?ex.id:await gCreate(data);
}
async function syncLoad(){
  if(!token||!gistId)return;
  try{
    setSS("syncing");bumpDot();
    data=await gLoad(gistId);
    lsave(data);setSS("ok");bumpDot();
    renderContent();
  }catch(e){setSS("error");bumpDot();}
}
function schedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(doPush,800);}
async function doPush(){
  if(!token||!gistId){lsave(data);return;}
  try{setSS("syncing");bumpDot();await gSave(gistId,data);lsave(data);setSS("ok");bumpDot();}
  catch(e){setSS("error");bumpDot();}
}
function setSS(s){syncState=s;}
function bumpDot(){
  const el=document.getElementById("sync-dot");
  if(el)el.className="sync-dot "+syncState;
}

// ── tag pool helpers ───────────────────────────────────────────────────────
function poolFor(cid){return(data.tagPools&&data.tagPools[cid])||[];}
function addToPool(cid,tag){
  if(!tag||!tag.trim())return;
  const p=poolFor(cid);
  if(!p.includes(tag)){data.tagPools=Object.assign({},data.tagPools,{[cid]:[...p,tag]});}
}
function removeFromPool(cid,tag){
  data.tagPools=Object.assign({},data.tagPools,{[cid]:poolFor(cid).filter(t=>t!==tag)});
}

// ── mutations ──────────────────────────────────────────────────────────────
function startCat(id){
  const now=Date.now(),sessions=[...data.sessions];
  if(data.activeSession){
    sessions.push({id:"s"+now,categoryId:data.activeSession.categoryId,tags:data.activeSession.tags||[],startTime:data.activeSession.startTime,endTime:now});
  }
  const stopping=data.activeSession&&data.activeSession.categoryId===id;
  data=Object.assign({},data,{sessions,activeSession:stopping?null:{categoryId:id,tags:[],startTime:now}});
  showTagInput=false;
  schedSave();
  renderContent();
}

function openTagInput(){
  showTagInput=true;
  renderContent();
  setTimeout(()=>{const el=document.getElementById("tag-in");if(el)el.focus();},40);
}
function closeTagInput(){showTagInput=false;renderContent();}

function addActiveTag(){
  if(!data.activeSession)return;
  const inp=document.getElementById("tag-in");
  const val=inp?(inp.value||"").trim():"";
  if(!val)return;
  const tags=data.activeSession.tags||[];
  if(!tags.includes(val)){
    addToPool(data.activeSession.categoryId,val);
    data=Object.assign({},data,{activeSession:Object.assign({},data.activeSession,{tags:[...tags,val]})});
  }
  schedSave();
  renderContent();
  setTimeout(()=>{const el=document.getElementById("tag-in");if(el){el.value="";el.focus();}},20);
}

function removeActiveTag(tag){
  if(!data.activeSession)return;
  const tags=(data.activeSession.tags||[]).filter(t=>t!==tag);
  data=Object.assign({},data,{activeSession:Object.assign({},data.activeSession,{tags})});
  schedSave();renderContent();
}

function pickPoolTag(tag){
  if(!data.activeSession)return;
  const tags=data.activeSession.tags||[];
  if(tags.includes(tag))return;
  data=Object.assign({},data,{activeSession:Object.assign({},data.activeSession,{tags:[...tags,tag]})});
  schedSave();renderContent();
}

function addSessionTag(sid){
  const inp=document.getElementById("sedit-in-"+sid);
  const val=inp?(inp.value||"").trim():"";
  if(!val)return;
  const sessions=data.sessions.map(s=>{
    if(s.id!==sid)return s;
    if((s.tags||[]).includes(val))return s;
    addToPool(s.categoryId,val);
    return Object.assign({},s,{tags:[...(s.tags||[]),val]});
  });
  data=Object.assign({},data,{sessions});
  schedSave();renderContent();
  setTimeout(()=>{const el=document.getElementById("sedit-in-"+sid);if(el){el.value="";el.focus();}},20);
}

function removeSessionTag(sid,tag){
  const sessions=data.sessions.map(s=>s.id===sid?Object.assign({},s,{tags:(s.tags||[]).filter(t=>t!==tag)}):s);
  data=Object.assign({},data,{sessions});
  schedSave();renderContent();
}

function pickSessionPoolTag(sid,tag){
  const sessions=data.sessions.map(s=>{
    if(s.id!==sid||(s.tags||[]).includes(tag))return s;
    return Object.assign({},s,{tags:[...(s.tags||[]),tag]});
  });
  data=Object.assign({},data,{sessions});
  schedSave();renderContent();
}

function deletePoolTag(cid,tag){
  removeFromPool(cid,tag);
  if(data.activeSession&&data.activeSession.categoryId===cid){
    const tags=(data.activeSession.tags||[]).filter(t=>t!==tag);
    data=Object.assign({},data,{activeSession:Object.assign({},data.activeSession,{tags})});
  }
  schedSave();renderContent();
}

function renameTag(cid,oldTag,newTag){
  newTag=(newTag||"").trim();
  if(!newTag||newTag===oldTag){editingTag=null;renderContent();return;}
  // update pool: replace in-place to preserve order
  const pool=poolFor(cid).map(t=>t===oldTag?newTag:t);
  // deduplicate in case newTag already existed
  const deduped=pool.filter((t,i)=>pool.indexOf(t)===i);
  data.tagPools=Object.assign({},data.tagPools,{[cid]:deduped});
  // update all sessions
  const sessions=data.sessions.map(s=>{
    if(s.categoryId!==cid)return s;
    const tags=(s.tags||[]).map(t=>t===oldTag?newTag:t);
    const dedup=tags.filter((t,i)=>tags.indexOf(t)===i);
    return Object.assign({},s,{tags:dedup});
  });
  // update active session if applicable
  let activeSession=data.activeSession;
  if(activeSession&&activeSession.categoryId===cid){
    const tags=(activeSession.tags||[]).map(t=>t===oldTag?newTag:t);
    const dedup=tags.filter((t,i)=>tags.indexOf(t)===i);
    activeSession=Object.assign({},activeSession,{tags:dedup});
  }
  data=Object.assign({},data,{sessions,activeSession});
  editingTag=null;
  schedSave();renderContent();
}

function removeCat(id){
  if(data.activeSession&&data.activeSession.categoryId===id){
    data=Object.assign({},data,{activeSession:null});
    showTagInput=false;
  }
  data=Object.assign({},data,{categories:data.categories.filter(c=>c.id!==id)});
  schedSave();renderContent();
}

function addCat(name){
  if(!name.trim())return;
  const color=CAT_COLORS[data.categories.length%CAT_COLORS.length];
  const newCat={id:"c"+Date.now(),name:name.trim(),color};
  data=Object.assign({},data,{categories:[...data.categories,newCat]});
  schedSave();renderContent();
}

// ── analytics ──────────────────────────────────────────────────────────────
function dayKey(ts){return new Date(ts).toDateString();}
function getSessions(p){
  const all=[...data.sessions];
  if(data.activeSession)all.push(Object.assign({},data.activeSession,{endTime:Date.now()}));
  const now=new Date();
  return all.filter(s=>{
    const d=new Date(s.startTime);
    if(p==="today")return dayKey(s.startTime)===dayKey(Date.now());
    if(p==="week"){const w=new Date(now);w.setDate(now.getDate()-7);return d>=w;}
    if(p==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(p==="year")return d.getFullYear()===now.getFullYear();
    return true;
  });
}
function getStats(p){
  const stats={};data.categories.forEach(c=>{stats[c.id]=0;});
  getSessions(p).forEach(s=>{if(s.categoryId in stats)stats[s.categoryId]+=(s.endTime-s.startTime);});
  return stats;
}
function getTagStats(p,cid){
  const stats={};
  getSessions(p).filter(s=>s.categoryId===cid).forEach(s=>{
    (s.tags||[]).forEach(t=>{stats[t]=(stats[t]||0)+(s.endTime-s.startTime);});
  });
  return Object.entries(stats).sort((a,b)=>b[1]-a[1]);
}
function getDailyAvg(p){
  if(p==="today")return null;
  const ss=getSessions(p);if(!ss.length)return null;
  const days=new Set(ss.map(s=>dayKey(s.startTime)));
  return ss.reduce((a,s)=>a+(s.endTime-s.startTime),0)/days.size;
}
function tagUseCount(cid,tag){
  return data.sessions.filter(s=>s.categoryId===cid&&(s.tags||[]).includes(tag)).length;
}
// Up to 5 most recently used tags for a category (recency order, unique)
function recentTagsFor(catId){
  const seen=[],result=[];
  for(let i=data.sessions.length-1;i>=0;i--){
    const s=data.sessions[i];
    if(s.categoryId!==catId)continue;
    for(const t of(s.tags||[])){
      if(!seen.includes(t)){seen.push(t);result.push(t);}
      if(result.length>=5)return result;
    }
  }
  return result;
}
function setTagFilter(catId,tag){
  activeTagFilter=(activeTagFilter&&activeTagFilter.catId===catId&&activeTagFilter.tag===tag)?null:{catId,tag};
  renderContent();
}
function clearTagFilter(){activeTagFilter=null;renderContent();}

// ── formatters ─────────────────────────────────────────────────────────────
function fmt(sec){
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  return h>0?`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`:`${m}:${String(s).padStart(2,"0")}`;
}
function fmtMs(ms){
  if(ms<60000)return`${Math.round(ms/1000)}s`;
  const h=ms/3600000;return h<1?`${Math.round(ms/60000)}m`:`${h.toFixed(1)}h`;
}
// Safe for HTML attributes (double-quoted) and text content
function esc(s){
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

// ── pie chart ──────────────────────────────────────────────────────────────
function makePie(slices,sz){
  const total=slices.reduce((a,s)=>a+s.v,0);
  if(!total)return`<circle cx="${sz/2}" cy="${sz/2}" r="${sz/2-2}" fill="var(--bg3)"/>`;
  const cx=sz/2,cy=sz/2,r=sz/2-2;let a=-Math.PI/2,out="";
  slices.filter(s=>s.v>0).forEach(s=>{
    const sw=(s.v/total)*Math.PI*2;if(sw<0.001)return;
    const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);a+=sw;
    const x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a);
    out+=`<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${sw>Math.PI?1:0},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${s.color}"/>`;
  });
  return out;
}

// ── CSV export ─────────────────────────────────────────────────────────────
function dlCSV(rows,filename){
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=filename;a.click();
}
function exportSessions(){
  const ss=getSessions(period).filter(s=>s.endTime);
  if(!ss.length){alert("No completed sessions for this period.");return;}
  const rows=[["Date","Start","End","Category","Duration (min)","Tags"]];
  ss.forEach(s=>{
    const cat=data.categories.find(c=>c.id===s.categoryId);
    const d=new Date(s.startTime);
    rows.push([d.toLocaleDateString(),d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),new Date(s.endTime).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),cat?cat.name:"Unknown",((s.endTime-s.startTime)/60000).toFixed(1),(s.tags||[]).join("; ")]);
  });
  dlCSV(rows,`sessions-${period.replace(/\s+/g,"-")}.csv`);
}
function exportDaily(){
  const ss=getSessions(period).filter(s=>s.endTime);
  if(!ss.length){alert("No completed sessions for this period.");return;}
  const dayMap={};
  ss.forEach(s=>{
    const dk=dayKey(s.startTime);
    if(!dayMap[dk])dayMap[dk]={_date:new Date(s.startTime)};
    dayMap[dk][s.categoryId]=(dayMap[dk][s.categoryId]||0)+(s.endTime-s.startTime);
  });
  const cats=data.categories;
  const rows=[["Date",...cats.map(c=>c.name+" (hrs)")]];
  Object.values(dayMap).sort((a,b)=>a._date-b._date).forEach(day=>{
    rows.push([day._date.toLocaleDateString(),...cats.map(c=>day[c.id]?(day[c.id]/3600000).toFixed(2):"")]);
  });
  dlCSV(rows,`daily-summary-${period.replace(/\s+/g,"-")}.csv`);
}
function exportCSV(){exportSessions();}


// ── build: tracker ─────────────────────────────────────────────────────────
function buildTracker(){
  const ac=data.activeSession?data.categories.find(c=>c.id===data.activeSession.categoryId):null;
  const elapsed=data.activeSession?Math.floor((Date.now()-data.activeSession.startTime)/1000):0;
  const activeTags=data.activeSession?data.activeSession.tags||[]:[];

  // active display
  let h=`<div class="active-display" style="border-left-color:${ac?ac.color:"var(--border2)"}">`;
  if(ac){
    h+=`<div class="active-label">${esc(ac.name)}</div>`;
    h+=`<div class="active-timer" id="timer-el">${fmt(elapsed)}</div>`;
    if(activeTags.length){
      h+=`<div class="active-tags-row">`;
      activeTags.forEach(t=>{
        h+=`<span class="a-chip">${esc(t)}<button class="a-chip-rm" data-tag="${esc(t)}" onclick="removeActiveTag(this.dataset.tag)">×</button></span>`;
      });
      h+=`</div>`;
    }
  }else{
    h+=`<div class="active-label">No active timer</div>`;
    h+=`<div class="active-timer idle">–:––</div>`;
  }
  h+=`</div>`;

  // tag input area
  if(ac){
    const recentTags=recentTagsFor(ac.id).filter(t=>!activeTags.includes(t));
    if(recentTags.length){
      h+=`<div class="recent-tags-row">`;
      recentTags.forEach(t=>{
        h+=`<button class="recent-tag-chip" data-tag="${esc(t)}" onclick="pickPoolTag(this.dataset.tag)"><span class="recent-tag-dot" style="background:${ac.color}"></span>${esc(t)}</button>`;
      });
      h+=`</div>`;
    }
    if(!showTagInput){
      h+=`<button class="tag-add-btn" onclick="openTagInput()">+ Add tag</button>`;
    }else{
      const cid=data.activeSession.categoryId;
      const pool=poolFor(cid).filter(t=>!activeTags.includes(t));
      h+=`<div class="tag-panel">`;
      h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><span class="tag-panel-title" style="margin-bottom:0">Add tag</span><button class="icon-btn" style="padding:2px 6px;font-size:13px;color:var(--text3)" onclick="closeTagInput()">Done</button></div>`;
      h+=`<div class="tag-input-row">`;
      h+=`<input class="inp" id="tag-in" type="text" placeholder="New tag or choose below…" onkeydown="if(event.key==='Enter'){event.preventDefault();addActiveTag();}">`;
      h+=`<button class="tag-set-btn" onclick="addActiveTag()">Add</button>`;
      h+=`</div>`;
      if(pool.length){
        h+=`<div class="pool-chips">`;
        pool.forEach(t=>{
          h+=`<button class="pool-chip" data-tag="${esc(t)}" onclick="pickPoolTag(this.dataset.tag)">${esc(t)}</button>`;
        });
        h+=`</div>`;
      }
      h+=`</div>`;
    }
  }

  // category list
  h+=`<div class="cat-list">`;
  data.categories.forEach(cat=>{
    const isActive=!!(data.activeSession&&data.activeSession.categoryId===cat.id);
    h+=`<div class="cat-row">`;
    h+=`<button class="cat-btn${isActive?" active":""}" style="border-left-color:${cat.color}" onclick="startCat('${cat.id}')">`;
    h+=`<span style="font-weight:${isActive?500:400}">${esc(cat.name)}</span>`;
    h+=`<div class="cat-btn-right">`;
    if(isActive)h+=`<span class="cat-hint">stop</span>`;
    h+=`<span class="cat-dot" style="background:${cat.color}"></span>`;
    h+=`</div></button>`;
    h+=`<button class="cat-rm" onclick="removeCat('${cat.id}')">×</button>`;
    h+=`</div>`;
  });
  h+=`</div>`;

  // add category
  h+=`<div class="add-wrap">`;
  if(!addingCat){
    h+=`<button class="add-link" onclick="toggleAddCat()">+ Add category</button>`;
  }else{
    h+=`<div class="add-row">`;
    h+=`<input class="inp" id="new-cat-in" placeholder="Category name" onkeydown="newCatKey(event)" style="flex:1">`;
    h+=`<button class="sm-btn" onclick="submitCat()">Add</button>`;
    h+=`<button class="sm-btn" onclick="toggleAddCat()">Cancel</button>`;
    h+=`</div>`;
  }
  h+=`</div>`;
  return h;
}

// ── build: insights ────────────────────────────────────────────────────────
function buildInsights(){
  const periods=["today","week","month","year","all time"];

  // period + export row
  let h=`<div class="period-row">`;
  periods.forEach(p=>{
    h+=`<button class="period-btn${period===p?" active":""}" onclick="setPeriod('${p}')">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`;
  });
  h+=`<button class="export-btn" onclick="exportSessions()">Sessions CSV</button>`;
  h+=`<button class="export-btn" onclick="exportDaily()">Daily CSV</button></div>`;

  // collect all tags used in this period, grouped by category
  const allSessions=getSessions(period);
  const tagsByCat={};
  allSessions.filter(s=>s.endTime).forEach(s=>{
    (s.tags||[]).forEach(t=>{
      if(!tagsByCat[s.categoryId])tagsByCat[s.categoryId]=new Set();
      tagsByCat[s.categoryId].add(t);
    });
  });
  const hasTags=Object.keys(tagsByCat).some(cid=>tagsByCat[cid].size>0);

  // tag filter chips
  if(hasTags){
    h+=`<div class="tag-filter-row">`;
    data.categories.forEach(cat=>{
      if(!tagsByCat[cat.id])return;
      [...tagsByCat[cat.id]].sort().forEach(tag=>{
        const isActive=!!(activeTagFilter&&activeTagFilter.catId===cat.id&&activeTagFilter.tag===tag);
        h+=`<button class="tag-filter-chip${isActive?" active":""}" data-catid="${cat.id}" data-tag="${esc(tag)}" onclick="setTagFilter(this.dataset.catid,this.dataset.tag)">`;
        h+=`<span class="tag-filter-dot" style="background:${cat.color}"></span>${esc(tag)}`;
        h+=`</button>`;
      });
    });
    h+=`</div>`;
  }

  // apply filter to sessions
  let ss=allSessions;
  if(activeTagFilter){
    ss=ss.filter(s=>s.categoryId===activeTagFilter.catId&&(s.tags||[]).includes(activeTagFilter.tag));
    const filterCat=data.categories.find(c=>c.id===activeTagFilter.catId);
    h+=`<div class="filter-bar">`;
    h+=`<span class="tag-filter-dot" style="background:${filterCat?filterCat.color:"var(--text3)"}"></span>`;
    h+=`<span>Showing <span class="filter-bar-tag">${esc(activeTagFilter.tag)}</span>`;
    if(filterCat)h+=` in ${esc(filterCat.name)}`;
    h+=`</span>`;
    h+=`<button class="filter-clear-btn" onclick="clearTagFilter()">Clear ×</button>`;
    h+=`</div>`;
  }

  // stats from filtered sessions
  const stats={};data.categories.forEach(c=>{stats[c.id]=0;});
  ss.forEach(s=>{if(s.categoryId in stats)stats[s.categoryId]+=(s.endTime-s.startTime);});
  const total=Object.values(stats).reduce((a,b)=>a+b,0);
  const sorted=data.categories.map(c=>({...c,ms:stats[c.id]||0})).sort((a,b)=>b.ms-a.ms);

  // daily avg from filtered sessions
  let avg=null;
  if(period!=="today"&&ss.length){
    const days=new Set(ss.map(s=>dayKey(s.startTime)));
    avg=ss.reduce((a,s)=>a+(s.endTime-s.startTime),0)/days.size;
  }

  // summary cards
  h+=`<div class="summary-grid">`;
  h+=`<div class="sum-card"><div class="sum-label">${period==="today"?"today's total":"total tracked"}</div><div class="sum-val">${total>0?fmtMs(total):"–"}</div></div>`;
  if(avg)h+=`<div class="sum-card"><div class="sum-label">daily avg</div><div class="sum-val">${fmtMs(avg)}</div></div>`;
  h+=`</div>`;

  // pie
  if(total>0){
    const sz=120;
    h+=`<div class="pie-wrap">`;
    h+=`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="flex-shrink:0;border-radius:50%;overflow:hidden">${makePie(sorted.map(c=>({v:c.ms,color:c.color})),sz)}</svg>`;
    h+=`<div class="pie-legend">`;
    sorted.filter(c=>c.ms>0).forEach(c=>{
      h+=`<div class="pie-li"><span class="pie-sw" style="background:${c.color}"></span><span class="pie-name">${esc(c.name)}</span><span class="pie-val">${Math.round(c.ms/total*100)}%</span></div>`;
    });
    h+=`</div></div>`;
  }

  // category bars with tag breakdown
  h+=`<div class="cat-bars">`;
  sorted.forEach(cat=>{
    const pct=total>0?Math.round(cat.ms/total*100):0;
    h+=`<div>`;
    h+=`<div class="bar-head"><span>${esc(cat.name)}${cat.ms>0?`<span class="bar-pct">${pct}%</span>`:""}</span><span class="bar-time">${cat.ms>0?fmtMs(cat.ms):"–"}</span></div>`;
    h+=`<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>`;
    h+=`</div>`;
  });
  h+=`</div>`;

  // collect tag totals across all categories (respects active filter)
  const allTagStats=[];
  data.categories.forEach(cat=>{
    const tStats={};
    ss.filter(s=>s.categoryId===cat.id).forEach(s=>{
      (s.tags||[]).forEach(t=>{tStats[t]=(tStats[t]||0)+(s.endTime-s.startTime);});
    });
    Object.entries(tStats).forEach(([t,ms])=>allTagStats.push({tag:t,ms,color:cat.color,catName:cat.name}));
  });
  allTagStats.sort((a,b)=>b.ms-a.ms);

  if(allTagStats.length){
    const tagTotal=allTagStats.reduce((a,t)=>a+t.ms,0);
    h+=`<div class="tag-viz-hd">`;
    h+=`<span class="tag-viz-title">Tags</span>`;
    h+=`<div class="viz-toggle">`;
    h+=`<button class="viz-toggle-btn${tagViewMode==="bar"?" active":""}" onclick="setTagViewMode('bar')">Bar</button>`;
    h+=`<button class="viz-toggle-btn${tagViewMode==="pie"?" active":""}" onclick="setTagViewMode('pie')">Pie</button>`;
    h+=`</div></div>`;

    if(tagViewMode==="bar"){
      const maxMs=allTagStats[0].ms;
      h+=`<div class="tag-bars">`;
      allTagStats.forEach(({tag,ms,color,catName})=>{
        h+=`<div class="tag-bar-row">`;
        h+=`<div class="tag-bar-label"><span class="tag-bar-dot" style="background:${color}"></span>${esc(tag)}</div>`;
        h+=`<div class="tag-bar-track"><div class="tag-bar-fill" style="width:${Math.round(ms/maxMs*100)}%;background:${color}"></div></div>`;
        h+=`<div class="tag-bar-val">${fmtMs(ms)}</div>`;
        h+=`</div>`;
      });
      h+=`</div>`;
    }else{
      const sz=120;
      h+=`<div class="tag-pie-wrap">`;
      h+=`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="flex-shrink:0;border-radius:50%;overflow:hidden">${makePie(allTagStats.map(t=>({v:t.ms,color:t.color})),sz)}</svg>`;
      h+=`<div class="pie-legend">`;
      allTagStats.forEach(({tag,ms,color})=>{
        h+=`<div class="pie-li"><span class="pie-sw" style="background:${color}"></span><span class="pie-name">${esc(tag)}</span><span class="pie-val">${Math.round(ms/tagTotal*100)}%</span></div>`;
      });
      h+=`</div></div>`;
    }
  }

  // session list
  const completed=ss.filter(s=>s.endTime);
  if(completed.length){
    h+=`<div class="sec-label">Sessions</div><div class="session-list">`;
    completed.slice(-25).reverse().forEach(s=>{
      const cat=data.categories.find(c=>c.id===s.categoryId);
      if(!cat)return;
      const dur=Math.floor((s.endTime-s.startTime)/1000);
      const d=new Date(s.startTime);
      const tStr=period==="today"
        ?d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})
        :`${d.toLocaleDateString([],{month:"short",day:"numeric"})} · ${d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}`;
      const isExp=expandedSid===s.id;
      const tagsList=s.tags||[];
      const nameDisplay=cat.name+(tagsList.length?" · "+tagsList.join(", "):"");

      h+=`<div class="s-item" style="border-left-color:${cat.color}">`;
      h+=`<div class="s-head" onclick="toggleSession('${s.id}')">`;
      h+=`<div class="s-main"><div class="s-name">${esc(nameDisplay)}</div><div class="s-time">${tStr}</div></div>`;
      h+=`<span class="s-dur">${fmt(dur)}</span><span class="s-caret">${isExp?"▲":"▼"}</span>`;
      h+=`</div>`;

      if(isExp){
        const pool=poolFor(s.categoryId).filter(t=>!tagsList.includes(t));
        h+=`<div class="s-edit">`;
        h+=`<div class="s-edit-chips">`;
        tagsList.forEach(t=>{
          h+=`<span class="s-chip">${esc(t)}<button class="s-chip-rm" data-sid="${s.id}" data-tag="${esc(t)}" onclick="removeSessionTag(this.dataset.sid,this.dataset.tag)">×</button></span>`;
        });
        if(!expandedAddingTag){
          h+=`<button class="s-add-btn" onclick="openSessionTagInput('${s.id}')">+ tag</button>`;
        }
        h+=`</div>`;
        if(expandedAddingTag){
          h+=`<div class="s-tag-row">`;
          h+=`<input class="inp" id="sedit-in-${s.id}" placeholder="Add tag…" onkeydown="if(event.key==='Enter'){event.preventDefault();addSessionTag('${s.id}');}">`;
          h+=`<button class="sm-btn" onclick="addSessionTag('${s.id}')">Add</button>`;
          h+=`<button class="sm-btn" onclick="closeSessionTagInput()">Done</button>`;
          h+=`</div>`;
          if(pool.length){
            h+=`<div class="s-pool-chips">`;
            pool.forEach(t=>{
              h+=`<button class="s-pool-chip" data-sid="${s.id}" data-tag="${esc(t)}" onclick="pickSessionPoolTag(this.dataset.sid,this.dataset.tag)">${esc(t)}</button>`;
            });
            h+=`</div>`;
          }
        }
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="empty">${activeTagFilter?"No sessions match this filter":"No sessions for this period"}</div>`;
  }
  return h;
}

// ── build: manage ──────────────────────────────────────────────────────────
function buildManage(){
  let h=`<div class="manage-section">`;
  h+=`<div class="manage-section-hd"><span class="manage-section-title">Tags</span></div>`;
  h+=`<div class="manage-section-desc">Edit or remove tags. Removing stops it appearing as a suggestion — past sessions keep their labels. Renaming updates all sessions.</div>`;

  data.categories.forEach(cat=>{
    const pool=poolFor(cat.id);
    h+=`<div class="tags-cat-block">`;
    h+=`<div class="tags-cat-hd"><span class="tags-cat-dot" style="background:${cat.color}"></span><span class="tags-cat-name">${esc(cat.name)}</span></div>`;
    if(pool.length){
      h+=`<div class="tag-mgmt-list">`;
      pool.forEach(tag=>{
        const count=tagUseCount(cat.id,tag);
        const isEditing=!!(editingTag&&editingTag.catId===cat.id&&editingTag.tag===tag);
        h+=`<div class="tag-mgmt-item">`;
        if(isEditing){
          const eid=`tedit-${cat.id}-${esc(tag)}`;
          h+=`<div class="tag-edit-row">`;
          h+=`<input class="inp" id="${eid}" value="${esc(tag)}" onkeydown="tagEditKey(event,'${esc(cat.id)}','${esc(tag)}','${eid}')">`;
          h+=`<button class="sm-btn" onclick="submitTagEdit('${esc(cat.id)}','${esc(tag)}','${eid}')">Save</button>`;
          h+=`<button class="sm-btn" onclick="cancelTagEdit()">Cancel</button>`;
          h+=`</div>`;
        }else{
          h+=`<span class="tag-mgmt-name">${esc(tag)}</span>`;
          h+=`<span class="tag-mgmt-count">${count} session${count!==1?"s":""}</span>`;
          h+=`<button class="tag-mgmt-edit" data-catid="${cat.id}" data-tag="${esc(tag)}" onclick="startTagEdit(this.dataset.catid,this.dataset.tag)" title="Rename">✎</button>`;
          h+=`<button class="tag-mgmt-del" data-catid="${cat.id}" data-tag="${esc(tag)}" onclick="deletePoolTag(this.dataset.catid,this.dataset.tag)" title="Delete">×</button>`;
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    }else{
      h+=`<div class="tags-empty">No tags yet for this category.</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

// ── build: settings ────────────────────────────────────────────────────────
function buildSettings(){
  const connected=!!(token&&gistId);
  let h=`<div class="setup-card"><div class="setup-title">GitHub sync</div>`;
  if(connected){
    h+=`<div class="setup-desc">Connected. Data syncs automatically via a private GitHub Gist.</div>`;
    h+=`<div class="setup-field"><label>Gist ID</label><input class="inp" value="${esc(gistId)}" readonly style="font-family:var(--mono);font-size:12px;color:var(--text3)"></div>`;
    h+=`<div class="setup-actions"><button class="sm-btn" onclick="syncLoad()">Sync now</button><button class="danger-btn" onclick="doDisconnect()">Disconnect</button></div>`;
  }else{
    h+=`<div class="setup-desc">Connect GitHub to sync across devices. Stored in a <strong>private</strong> Gist only you can see.<br><br>`;
    h+=`<strong>Steps:</strong><br>1. Go to <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens/new</a><br>`;
    h+=`2. Give it any name, e.g. "Time Tracker"<br>3. Check <strong>gist</strong> scope only<br>4. Generate and paste the token below</div>`;
    h+=`<div class="setup-field"><label>Personal Access Token</label><input class="inp" id="tok-in" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"></div>`;
    h+=`<div id="setup-msg"></div>`;
    h+=`<div class="setup-actions"><button class="primary-btn" id="conn-btn" onclick="doConnect()">Connect</button></div>`;
  }
  return h+`</div>`;
}

// ── render ─────────────────────────────────────────────────────────────────
function renderTopbar(){
  const el=document.getElementById("topbar");
  if(!el)return;
  el.innerHTML=
    `<div style="display:flex;align-items:center;gap:10px;">`+
    `<img src="logo.png" alt="" id="logo-img" style="height:28px;width:auto;display:block;" onerror="this.style.display='none'">`+
    `<span class="tb-title">Time Tracker</span>`+
    `</div>`+
    `<div class="tb-right">`+
    `<span class="sync-dot ${syncState}" id="sync-dot"></span>`+
    `<button class="icon-btn" onclick="toggleSettings()">${showSettings?"←":"⚙"}</button>`+
    `</div>`;
}

function renderNav(){
  const el=document.getElementById("nav");
  if(!el)return;
  if(showSettings){el.innerHTML="";return;}
  el.innerHTML=
    `<div class="nav-shell" id="nav-shell">`+
    `<div class="nav-bubble" id="nav-bubble"></div>`+
    TABS.map(t=>`<button class="nav-tab${view===t?" active":""}" id="nav-tab-${t}" onclick="setView('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join("")+
    `</div>`;
  // Snap bubble to current tab after paint
  requestAnimationFrame(()=>{
    const bubble=document.getElementById("nav-bubble");
    const tab=document.getElementById("nav-tab-"+view);
    if(!bubble||!tab)return;
    bubble.style.transition="none";
    bubble.style.transform=`translateX(${tab.offsetLeft}px)`;
    bubble.style.width=tab.offsetWidth+"px";
    requestAnimationFrame(()=>{bubble.style.transition="";});
  });
}

function renderContent(){
  try{
    const el=document.getElementById("content");
    if(!el)return;
    if(showSettings){el.innerHTML=buildSettings();return;}
    if(view==="tracker")el.innerHTML=buildTracker();
    else if(view==="insights")el.innerHTML=buildInsights();
    else el.innerHTML=buildManage();
  }catch(e){
    console.error("renderContent:",e);
    const el=document.getElementById("content");
    if(el)el.innerHTML=`<div style="color:var(--text2);padding:1rem 0;font-size:13px;">Render error — <button style="background:transparent;border:none;cursor:pointer;text-decoration:underline;font-family:inherit;color:var(--text2)" onclick="location.reload()">reload</button></div>`;
  }
}

// setView: only update nav DOM, then render content. Never rebuilds nav.
function setView(v){
  view=v;
  try{localStorage.setItem("tt-view",v);}catch(e){}
  // Update active class on existing tab buttons
  TABS.forEach(t=>{
    const tab=document.getElementById("nav-tab-"+t);
    if(tab)tab.classList.toggle("active",t===v);
  });
  // Animate bubble to new tab
  const bubble=document.getElementById("nav-bubble");
  const tab=document.getElementById("nav-tab-"+v);
  if(bubble&&tab){
    bubble.style.transform=`translateX(${tab.offsetLeft}px)`;
    bubble.style.width=tab.offsetWidth+"px";
  }
  renderContent();
}

function toggleSettings(){
  showSettings=!showSettings;
  renderTopbar();
  renderNav();
  renderContent();
}

// ── ui handlers ────────────────────────────────────────────────────────────
function setPeriod(p){period=p;activeTagFilter=null;renderContent();}
function setTagViewMode(m){tagViewMode=m;renderContent();}
function toggleAddCat(){
  addingCat=!addingCat;
  renderContent();
  if(addingCat)setTimeout(()=>{const el=document.getElementById("new-cat-in");if(el)el.focus();},30);
}
function submitCat(){
  const el=document.getElementById("new-cat-in");
  const v=(el?el.value:"").trim();
  if(v){addCat(v);addingCat=false;}
}
function newCatKey(ev){
  if(ev.key==="Enter")submitCat();
  if(ev.key==="Escape"){addingCat=false;renderContent();}
}
function toggleSession(id){
  expandedSid=expandedSid===id?null:id;
  expandedAddingTag=false;
  renderContent();
}
function openSessionTagInput(sid){
  expandedAddingTag=true;
  renderContent();
  setTimeout(()=>{const el=document.getElementById("sedit-in-"+sid);if(el)el.focus();},30);
}
function closeSessionTagInput(){expandedAddingTag=false;renderContent();}
function startTagEdit(catId,tag){editingTag={catId,tag};renderContent();setTimeout(()=>{const id=`tedit-${catId}-${esc(tag)}`;const el=document.getElementById(id);if(el){el.focus();el.select();}},30);}
function cancelTagEdit(){editingTag=null;renderContent();}
function submitTagEdit(catId,oldTag,inputId){const el=document.getElementById(inputId);renameTag(catId,oldTag,el?el.value:oldTag);}
function tagEditKey(ev,catId,oldTag,inputId){if(ev.key==="Enter"){ev.preventDefault();submitTagEdit(catId,oldTag,inputId);}if(ev.key==="Escape")cancelTagEdit();}

async function doConnect(){
  const tokEl=document.getElementById("tok-in");
  const tok=(tokEl?tokEl.value:"").trim();
  const msgEl=document.getElementById("setup-msg");
  const btn=document.getElementById("conn-btn");
  if(!tok){if(msgEl)msgEl.innerHTML=`<div class="fl-msg error">Please enter a token.</div>`;return;}
  if(btn){btn.disabled=true;btn.textContent="Connecting…";}
  try{
    token=tok;
    gistId=await findOrCreate();
    localStorage.setItem(TKEY,token);
    localStorage.setItem(GKEY,gistId);
    await syncLoad();
    showSettings=false;
    renderTopbar();renderNav();renderContent();
  }catch(ex){
    token="";gistId="";
    if(msgEl)msgEl.innerHTML=`<div class="fl-msg error">Failed: ${esc(ex.message)}</div>`;
    if(btn){btn.disabled=false;btn.textContent="Connect";}
  }
}
function doDisconnect(){
  if(!confirm("Disconnect? Your local data stays but won't sync."))return;
  token="";gistId="";
  localStorage.removeItem(TKEY);
  localStorage.removeItem(GKEY);
  renderContent();
}

// ── clock tick (only updates text, never rebuilds DOM) ─────────────────────
setInterval(()=>{
  if(!data.activeSession||view!=="tracker"||showSettings)return;
  const el=document.getElementById("timer-el");
  if(el)el.textContent=fmt(Math.floor((Date.now()-data.activeSession.startTime)/1000));
},1000);

// ── init ───────────────────────────────────────────────────────────────────
(function(){
  try{
    const saved=lload();
    if(saved&&Array.isArray(saved.categories)&&saved.categories.length){
      data=saved;
      if(!data.tagPools)data.tagPools={};
    }
  }catch(e){console.warn("init load:",e);}
  try{const sv=localStorage.getItem("tt-view");if(sv&&TABS.includes(sv))view=sv;}catch(e){}
  token=localStorage.getItem(TKEY)||"";
  gistId=localStorage.getItem(GKEY)||"";
  renderTopbar();
  renderNav();
  renderContent();
  if(token&&gistId)syncLoad();
})();
</script>
</body>
</html>
