<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracker</title>
<style>
:root{
  --bg:#ffffff;--bg2:#f4f4f1;--bg3:#e6e5e1;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.18);
  --radius:10px;--radius-lg:14px;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1b1b1b;--bg2:#242424;--bg3:#2e2e2e;
  --text:#f0f0f0;--text2:#888;--text3:#555;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
#shell{max-width:520px;margin:0 auto;padding:1.75rem 1.25rem 5rem;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
.inp{font-size:14px;padding:9px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);width:100%;outline:none;}
.inp:focus{border-color:var(--text3);box-shadow:0 0 0 3px rgba(128,128,128,0.1);}
.inp::placeholder{color:var(--text3);}

/* topbar */
#topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.tb-title{font-size:16px;font-weight:500;letter-spacing:-0.01em;}
.tb-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--bg3);flex-shrink:0;transition:background 0.3s;}
.sync-dot.syncing{background:#EF9F27;}
.sync-dot.ok{background:#1D9E75;}
.sync-dot.error{background:#E24B4A;}
.icon-btn{background:transparent;border:none;padding:5px 7px;border-radius:8px;color:var(--text3);font-size:15px;line-height:1;}
.icon-btn:hover{color:var(--text2);background:var(--bg2);}

/* nav */
#nav{margin-bottom:1.75rem;}
.nav-shell{display:inline-flex;position:relative;background:var(--bg2);border-radius:var(--radius);padding:3px;}
.nav-bubble{position:absolute;top:3px;height:calc(100% - 6px);background:var(--bg);border-radius:7px;border:0.5px solid var(--border2);box-shadow:0 1px 4px rgba(0,0,0,0.08);transition:transform 0.22s cubic-bezier(0.4,0,0.2,1),width 0.22s cubic-bezier(0.4,0,0.2,1);pointer-events:none;z-index:0;}
.nav-tab{position:relative;z-index:1;padding:7px 20px;border:none;background:transparent;border-radius:7px;font-size:14px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:color 0.15s;}
.nav-tab.active{color:var(--text);font-weight:500;}

/* active display */
.active-display{padding:1.25rem 1.5rem;border-radius:var(--radius-lg);background:var(--bg2);margin-bottom:0.75rem;border:0.5px solid var(--border);border-left-width:4px;transition:border-left-color 0.2s;}
.active-label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:4px;}
.active-timer{font-size:46px;font-family:var(--mono);font-weight:500;letter-spacing:-0.03em;line-height:1.05;}
.active-timer.idle{color:var(--text3);}
.active-tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.a-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 7px 3px 10px;border-radius:20px;background:var(--bg3);font-size:12px;color:var(--text2);}
.a-chip-rm{border:none;background:transparent;color:var(--text3);font-size:14px;line-height:1;padding:0 1px;cursor:pointer;}
.a-chip-rm:hover{color:var(--text);}

/* tag panel */
.tag-add-btn{background:transparent;border:0.5px dashed var(--border2);color:var(--text3);font-size:12px;padding:5px 12px;border-radius:20px;margin-bottom:0.875rem;}
.tag-add-btn:hover{color:var(--text2);border-color:var(--text3);}
.tag-panel{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:0.875rem 1.125rem;margin-bottom:0.875rem;}
.tag-panel-title{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:8px;}
.tag-input-row{display:flex;gap:8px;margin-bottom:8px;}
.tag-input-row .inp{flex:1;}
.tag-set-btn{padding:0 16px;height:37px;border-radius:var(--radius);border:none;background:var(--text);color:var(--bg);font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.tag-set-btn:hover{opacity:0.85;}
.pool-chips{display:flex;flex-wrap:wrap;gap:5px;}
.pool-chip{padding:4px 11px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;}
.pool-chip:hover{background:var(--bg3);color:var(--text);}

/* category buttons */
.cat-list{display:flex;flex-direction:column;gap:8px;}
.cat-row{display:flex;align-items:stretch;gap:8px;}
.cat-btn{flex:1;display:flex;align-items:center;justify-content:space-between;padding:17px 20px;border-radius:var(--radius-lg);border:0.5px solid var(--border);border-left-width:4px;background:transparent;color:var(--text);text-align:left;font-size:17px;font-weight:400;transition:background 0.1s;}
.cat-btn:hover{background:var(--bg2);}
.cat-btn.active{background:var(--bg2);font-weight:500;}
.cat-btn-right{display:flex;align-items:center;gap:8px;}
.cat-hint{font-size:11px;color:var(--text3);font-family:var(--mono);}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cat-rm{border:none;background:transparent;color:var(--text3);font-size:19px;padding:6px 8px;border-radius:var(--radius);line-height:1;flex-shrink:0;align-self:center;}
.cat-rm:hover{color:var(--text);background:var(--bg2);}
.add-wrap{margin-top:12px;}
.add-link{background:transparent;border:none;font-size:13px;color:var(--text3);padding:0;}
.add-link:hover{color:var(--text2);}
.add-row{display:flex;gap:8px;margin-top:6px;}
.sm-btn{padding:0 14px;height:37px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text);font-size:13px;white-space:nowrap;}
.sm-btn:hover{background:var(--bg2);}

/* insights */
.period-row{display:flex;align-items:center;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
.period-btn{padding:5px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;}
.period-btn.active{background:var(--bg2);color:var(--text);}
.export-btn{margin-left:auto;padding:5px 11px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text3);font-size:12px;}
.export-btn:hover{color:var(--text2);background:var(--bg2);}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem;}
.sum-card{padding:1rem;border-radius:var(--radius);background:var(--bg2);}
.sum-label{font-size:12px;color:var(--text2);margin-bottom:3px;}
.sum-val{font-size:24px;font-family:var(--mono);font-weight:500;}
.pie-wrap{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.75rem;padding:1.25rem;background:var(--bg2);border-radius:var(--radius-lg);}
.pie-legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:0;}
.pie-li{display:flex;align-items:center;gap:8px;font-size:13px;}
.pie-sw{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.pie-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pie-val{font-family:var(--mono);font-size:12px;color:var(--text2);}
.cat-bars{display:flex;flex-direction:column;gap:16px;margin-bottom:1.75rem;}
.bar-head{display:flex;justify-content:space-between;margin-bottom:5px;font-size:14px;}
.bar-pct{font-size:12px;color:var(--text3);margin-left:5px;}
.bar-time{font-family:var(--mono);color:var(--text2);font-size:14px;}
.bar-track{height:4px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-bottom:6px;}
.bar-fill{height:100%;border-radius:3px;}
.tag-bk{display:flex;flex-direction:column;gap:3px;padding-left:10px;}
.tag-bk-item{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);}
.tag-bk-n{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;}
.tag-bk-v{font-family:var(--mono);flex-shrink:0;}
.sec-label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);margin-bottom:8px;}

/* session list */
.session-list{display:flex;flex-direction:column;gap:5px;margin-bottom:1.75rem;}
.s-item{border-radius:var(--radius);border:0.5px solid var(--border);border-left-width:3px;overflow:hidden;}
.s-head{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;user-select:none;}
.s-head:hover{background:var(--bg2);}
.s-main{flex:1;min-width:0;}
.s-name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.s-time{font-size:11px;color:var(--text3);}
.s-dur{font-size:13px;font-family:var(--mono);color:var(--text2);flex-shrink:0;}
.s-caret{font-size:9px;color:var(--text3);flex-shrink:0;}
.s-edit{padding:10px 12px 12px;border-top:0.5px solid var(--border);background:var(--bg2);}
.s-edit-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;min-height:24px;}
.s-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 7px 3px 10px;border-radius:20px;background:var(--bg3);font-size:12px;color:var(--text2);}
.s-chip-rm{border:none;background:transparent;color:var(--text3);font-size:13px;line-height:1;padding:0 1px;cursor:pointer;}
.s-chip-rm:hover{color:var(--text);}
.s-add-btn{background:transparent;border:0.5px dashed var(--border2);color:var(--text3);font-size:12px;padding:3px 10px;border-radius:20px;}
.s-add-btn:hover{color:var(--text2);}
.s-tag-row{display:flex;gap:6px;margin-top:6px;}
.s-tag-row .inp{flex:1;font-size:13px;padding:6px 10px;}
.s-pool-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.s-pool-chip{padding:3px 9px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;}
.s-pool-chip:hover{background:var(--bg3);}
.empty{color:var(--text3);font-size:14px;padding:2rem 0;text-align:center;}

/* tags tab */
.tags-cat-section{margin-bottom:1.75rem;}
.tags-cat-hd{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--border);}
.tags-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.tags-cat-name{font-size:15px;font-weight:500;}
.tag-mgmt-list{display:flex;flex-direction:column;gap:4px;}
.tag-mgmt-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);border:0.5px solid var(--border);}
.tag-mgmt-name{flex:1;font-size:14px;}
.tag-mgmt-count{font-size:12px;color:var(--text3);font-family:var(--mono);flex-shrink:0;}
.tag-mgmt-del{border:none;background:transparent;color:var(--text3);font-size:15px;padding:2px 7px;border-radius:6px;line-height:1;flex-shrink:0;}
.tag-mgmt-del:hover{color:#E24B4A;background:rgba(226,75,74,0.1);}
.tags-empty{font-size:13px;color:var(--text3);padding:2px 0;}

/* settings */
.setup-card{padding:1.5rem;border-radius:var(--radius-lg);border:0.5px solid var(--border2);margin-bottom:1rem;}
.setup-title{font-size:16px;font-weight:500;margin-bottom:8px;}
.setup-desc{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:1rem;}
.setup-desc a{color:var(--text);}
.setup-field{margin-bottom:10px;}
.setup-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;}
.setup-actions{display:flex;gap:8px;margin-top:1rem;}
.primary-btn{padding:9px 18px;border-radius:var(--radius);border:none;background:var(--text);color:var(--bg);font-size:14px;font-weight:500;}
.primary-btn:hover{opacity:0.85;}
.primary-btn:disabled{opacity:0.4;cursor:default;}
.danger-btn{padding:9px 18px;border-radius:var(--radius);border:0.5px solid rgba(226,75,74,0.3);background:transparent;color:#E24B4A;font-size:14px;}
.fl-msg{font-size:13px;margin-top:10px;padding:8px 12px;border-radius:var(--radius);}
.fl-msg.error{background:rgba(226,75,74,0.08);color:#E24B4A;}
.fl-msg.ok{background:rgba(29,158,117,0.08);color:#1D9E75;}
</style>
</head>
<body>
<div id="shell">
  <div id="topbar"></div>
  <div id="nav"></div>
  <div id="content"></div>
</div>
<script>
// ── constants ──────────────────────────────────────────────────────────────
const CAT_COLORS=["#378ADD","#EF9F27","#1D9E75","#D85A30","#7F77DD","#D4537E","#639922","#E24B4A"];
const DEFAULT_CATS=[
  {id:"work",name:"Work",color:"#378ADD"},
  {id:"maintenance",name:"Maintenance",color:"#EF9F27"},
  {id:"fitness",name:"Fitness",color:"#1D9E75"},
  {id:"family",name:"Family",color:"#D85A30"},
  {id:"leisure",name:"Leisure",color:"#7F77DD"},
];
const LKEY="tt-v3",GKEY="tt-gist",TKEY="tt-token",GIST_FILE="time-tracker-data.json";
const TABS=["tracker","insights","tags"];

// ── state ──────────────────────────────────────────────────────────────────
let data={categories:[...DEFAULT_CATS],sessions:[],activeSession:null,tagPools:{}};
let view="tracker",period="today";
let showSettings=false,addingCat=false,showTagInput=false;
let expandedSid=null,expandedAddingTag=false;
let syncState="idle",syncMsg="",saveTimer=null;
let token="",gistId="";

// ── storage ────────────────────────────────────────────────────────────────
function lsave(d){try{localStorage.setItem(LKEY,JSON.stringify(d));}catch(e){console.warn("lsave",e);}}
function lload(){try{const s=localStorage.getItem(LKEY);return s?JSON.parse(s):null;}catch(e){return null;}}

// ── gist ───────────────────────────────────────────────────────────────────
const ghH=()=>({"Authorization":"token "+token,"Content-Type":"application/json"});
async function gLoad(id){
  const r=await fetch("https://api.github.com/gists/"+id,{headers:ghH()});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json(),c=d.files[GIST_FILE]?.content;
  if(!c)throw new Error("File not found");
  return JSON.parse(c);
}
async function gSave(id,d){
  const r=await fetch("https://api.github.com/gists/"+id,{method:"PATCH",headers:ghH(),body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(d)}}})});
  if(!r.ok)throw new Error("HTTP "+r.status);
}
async function gCreate(d){
  const r=await fetch("https://api.github.com/gists",{method:"POST",headers:ghH(),body:JSON.stringify({description:"time-tracker-data",public:false,files:{[GIST_FILE]:{content:JSON.stringify(d)}}})});
  if(!r.ok)throw new Error("HTTP "+r.status);
  return(await r.json()).id;
}
async function findOrCreate(){
  const r=await fetch("https://api.github.com/gists?per_page=100",{headers:ghH()});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const list=await r.json(),ex=list.find(g=>g.description==="time-tracker-data"&&g.files[GIST_FILE]);
  return ex?ex.id:await gCreate(data);
}
async function syncLoad(){
  if(!token||!gistId)return;
  try{setSS("syncing");bumpDot();data=await gLoad(gistId);lsave(data);setSS("ok");bumpDot();renderContent();}
  catch(e){setSS("error",e.message);bumpDot();}
}
function schedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(doPush,800);}
async function doPush(){
  if(!token||!gistId){lsave(data);return;}
  try{setSS("syncing");bumpDot();await gSave(gistId,data);lsave(data);setSS("ok");bumpDot();}
  catch(e){setSS("error","Save failed");bumpDot();}
}
function setSS(s,m){syncState=s;syncMsg=m||"";}
function bumpDot(){
  const el=document.getElementById("sync-dot");if(!el)return;
  el.className="sync-dot "+syncState;
}

// ── tag pool ───────────────────────────────────────────────────────────────
function poolFor(cid){return data.tagPools[cid]||[];}
function addToPool(cid,tag){
  if(!tag.trim())return;
  const p=poolFor(cid);
  if(!p.includes(tag))data.tagPools={...data.tagPools,[cid]:[...p,tag]};
}
function removeFromPool(cid,tag){
  data.tagPools={...data.tagPools,[cid]:poolFor(cid).filter(t=>t!==tag)};
}

// ── mutations ──────────────────────────────────────────────────────────────
function startCat(id){
  const now=Date.now(),sessions=[...data.sessions];
  if(data.activeSession){
    sessions.push({id:"s"+now,categoryId:data.activeSession.categoryId,tags:data.activeSession.tags||[],startTime:data.activeSession.startTime,endTime:now});
  }
  if(data.activeSession?.categoryId===id){
    data={...data,sessions,activeSession:null};
    showTagInput=false;
  }else{
    data={...data,sessions,activeSession:{categoryId:id,tags:[],startTime:now}};
    showTagInput=false;
  }
  schedSave();renderContent();
}

function addActiveTag(){
  const inp=document.getElementById("tag-in");
  const val=(inp?.value||"").trim();
  if(!val||!data.activeSession)return;
  const tags=data.activeSession.tags||[];
  if(tags.includes(val)){inp.value="";return;}
  addToPool(data.activeSession.categoryId,val);
  data={...data,activeSession:{...data.activeSession,tags:[...tags,val]}};
  inp.value="";
  schedSave();
  // update only the display and pool chips, keep input focused
  const ad=document.getElementById("active-display-el");
  if(ad)ad.outerHTML=buildActiveDisplay();
  updatePoolChips();
}

function removeActiveTag(tag){
  if(!data.activeSession)return;
  data={...data,activeSession:{...data.activeSession,tags:(data.activeSession.tags||[]).filter(t=>t!==tag)}};
  schedSave();
  const ad=document.getElementById("active-display-el");
  if(ad)ad.outerHTML=buildActiveDisplay();
}

function pickPoolTag(tag){
  if(!data.activeSession)return;
  const tags=data.activeSession.tags||[];
  if(tags.includes(tag))return;
  data={...data,activeSession:{...data.activeSession,tags:[...tags,tag]}};
  schedSave();
  const ad=document.getElementById("active-display-el");
  if(ad)ad.outerHTML=buildActiveDisplay();
  updatePoolChips();
}

function updatePoolChips(){
  const el=document.getElementById("pool-chips-el");
  if(!el||!data.activeSession)return;
  const cid=data.activeSession.categoryId;
  const pool=poolFor(cid).filter(t=>!(data.activeSession.tags||[]).includes(t));
  el.innerHTML=pool.map(t=>`<button class="pool-chip" onclick="pickPoolTag('${esc(t)}')">${esc(t)}</button>`).join("");
}

function addSessionTag(sid){
  const inp=document.getElementById("sedit-in-"+sid);
  const val=(inp?.value||"").trim();
  if(!val)return;
  const sessions=data.sessions.map(s=>{
    if(s.id!==sid)return s;
    if((s.tags||[]).includes(val))return s;
    addToPool(s.categoryId,val);
    return{...s,tags:[...(s.tags||[]),val]};
  });
  data={...data,sessions};
  schedSave();renderContent();
}

function removeSessionTag(sid,tag){
  data={...data,sessions:data.sessions.map(s=>s.id===sid?{...s,tags:(s.tags||[]).filter(t=>t!==tag)}:s)};
  schedSave();renderContent();
}

function pickSessionPoolTag(sid,tag){
  data={...data,sessions:data.sessions.map(s=>{
    if(s.id!==sid||(s.tags||[]).includes(tag))return s;
    return{...s,tags:[...(s.tags||[]),tag]};
  })};
  schedSave();renderContent();
}

function deletePoolTag(cid,tag){
  removeFromPool(cid,tag);
  if(data.activeSession?.categoryId===cid){
    data={...data,activeSession:{...data.activeSession,tags:(data.activeSession.tags||[]).filter(t=>t!==tag)}};
  }
  schedSave();renderContent();
}

function removeCat(id){
  if(data.activeSession?.categoryId===id){data={...data,activeSession:null};showTagInput=false;}
  data={...data,categories:data.categories.filter(c=>c.id!==id)};
  schedSave();renderContent();
}

function addCat(name){
  if(!name.trim())return;
  data={...data,categories:[...data.categories,{id:"c"+Date.now(),name:name.trim(),color:CAT_COLORS[data.categories.length%CAT_COLORS.length]}]};
  schedSave();renderContent();
}

// ── analytics ──────────────────────────────────────────────────────────────
function dayKey(ts){return new Date(ts).toDateString();}
function getSessions(p){
  const all=[...data.sessions];
  if(data.activeSession)all.push({...data.activeSession,endTime:Date.now()});
  const now=new Date();
  return all.filter(s=>{
    const d=new Date(s.startTime);
    if(p==="today")return dayKey(s.startTime)===dayKey(Date.now());
    if(p==="week"){const w=new Date(now);w.setDate(now.getDate()-7);return d>=w;}
    if(p==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(p==="year")return d.getFullYear()===now.getFullYear();
    return true;
  });
}
function getStats(p){
  const stats={};data.categories.forEach(c=>{stats[c.id]=0;});
  getSessions(p).forEach(s=>{if(s.categoryId in stats)stats[s.categoryId]+=(s.endTime-s.startTime);});
  return stats;
}
function getTagStats(p,cid){
  const stats={};
  getSessions(p).filter(s=>s.categoryId===cid).forEach(s=>{
    (s.tags||[]).forEach(t=>{stats[t]=(stats[t]||0)+(s.endTime-s.startTime);});
  });
  return Object.entries(stats).sort((a,b)=>b[1]-a[1]);
}
function getDailyAvg(p){
  if(p==="today")return null;
  const ss=getSessions(p);if(!ss.length)return null;
  const days=new Set(ss.map(s=>dayKey(s.startTime)));
  return ss.reduce((a,s)=>a+(s.endTime-s.startTime),0)/days.size;
}
function tagUseCount(cid,tag){
  return data.sessions.filter(s=>s.categoryId===cid&&(s.tags||[]).includes(tag)).length;
}

// ── formatters ─────────────────────────────────────────────────────────────
function fmt(sec){
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  return h>0?`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`:`${m}:${String(s).padStart(2,"0")}`;
}
function fmtMs(ms){
  if(ms<60000)return`${Math.round(ms/1000)}s`;
  const h=ms/3600000;return h<1?`${Math.round(ms/60000)}m`:`${h.toFixed(1)}h`;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

// ── pie ────────────────────────────────────────────────────────────────────
function makePie(slices,sz){
  const total=slices.reduce((a,s)=>a+s.v,0);
  if(!total)return`<circle cx="${sz/2}" cy="${sz/2}" r="${sz/2-2}" fill="var(--bg3)"/>`;
  const cx=sz/2,cy=sz/2,r=sz/2-2;let a=-Math.PI/2,out="";
  slices.filter(s=>s.v>0).forEach(s=>{
    const sw=(s.v/total)*Math.PI*2;if(sw<0.001)return;
    const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);a+=sw;
    const x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a);
    out+=`<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${sw>Math.PI?1:0},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${s.color}"/>`;
  });
  return out;
}

// ── CSV export ─────────────────────────────────────────────────────────────
function exportCSV(){
  const ss=getSessions(period).filter(s=>s.endTime);
  if(!ss.length){alert("No sessions for this period.");return;}
  const rows=[["Date","Start","End","Category","Duration (min)","Tags"]];
  ss.forEach(s=>{
    const cat=data.categories.find(c=>c.id===s.categoryId);
    const d=new Date(s.startTime);
    rows.push([d.toLocaleDateString(),d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),new Date(s.endTime).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),cat?cat.name:"Unknown",((s.endTime-s.startTime)/60000).toFixed(1),(s.tags||[]).join("; ")]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=`time-tracker-${period.replace(" ","-")}.csv`;
  a.click();
}

// ── build pieces ───────────────────────────────────────────────────────────
function buildActiveDisplay(){
  const ac=data.activeSession?data.categories.find(c=>c.id===data.activeSession.categoryId):null;
  const elapsed=data.activeSession?Math.floor((Date.now()-data.activeSession.startTime)/1000):0;
  const tags=data.activeSession?.tags||[];
  let h=`<div class="active-display" id="active-display-el" style="border-left-color:${ac?ac.color:"var(--border2)"}">`;
  if(ac){
    h+=`<div class="active-label">${esc(ac.name)}</div>`;
    h+=`<div class="active-timer" id="timer-el">${fmt(elapsed)}</div>`;
    if(tags.length){
      h+=`<div class="active-tags-row">`;
      tags.forEach(t=>{h+=`<span class="a-chip">${esc(t)}<button class="a-chip-rm" onclick="removeActiveTag('${esc(t)}')">×</button></span>`;});
      h+=`</div>`;
    }
  }else{
    h+=`<div class="active-label">No active timer</div>`;
    h+=`<div class="active-timer idle">–:––</div>`;
  }
  return h+`</div>`;
}

// ── render functions ───────────────────────────────────────────────────────
function renderTopbar(){
  document.getElementById("topbar").innerHTML=
    `<div class="tb-title">Time Tracker</div>`+
    `<div class="tb-right"><span class="sync-dot ${syncState}" id="sync-dot"></span>`+
    `<button class="icon-btn" onclick="toggleSettings()">${showSettings?"←":"⚙"}</button></div>`;
}

function renderNav(){
  // Only render nav when not in settings
  const navEl=document.getElementById("nav");
  if(showSettings){navEl.innerHTML="";return;}
  navEl.innerHTML=
    `<div class="nav-shell" id="nav-shell">`+
    `<div class="nav-bubble" id="nav-bubble"></div>`+
    TABS.map(t=>`<button class="nav-tab${view===t?" active":""}" id="nav-tab-${t}" onclick="setView('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join("")+
    `</div>`;
  positionBubble(false);
}

function positionBubble(animate){
  const bubble=document.getElementById("nav-bubble");
  const tab=document.getElementById("nav-tab-"+view);
  if(!bubble||!tab)return;
  if(!animate){bubble.style.transition="none";}
  bubble.style.transform=`translateX(${tab.offsetLeft}px)`;
  bubble.style.width=tab.offsetWidth+"px";
  if(!animate){
    // re-enable transition after first paint
    requestAnimationFrame(()=>requestAnimationFrame(()=>{bubble.style.transition="";}));
  }
}

function renderContent(){
  const el=document.getElementById("content");
  if(showSettings){el.innerHTML=buildSettings();return;}
  if(view==="tracker")el.innerHTML=buildTracker();
  else if(view==="insights")el.innerHTML=buildInsights();
  else el.innerHTML=buildTags();
}

function setView(v){
  view=v;
  // update active tab class
  TABS.forEach(t=>{
    const tab=document.getElementById("nav-tab-"+t);
    if(tab)tab.classList.toggle("active",t===v);
  });
  // slide bubble
  positionBubble(true);
  // swap content
  renderContent();
}

// ── build: tracker ─────────────────────────────────────────────────────────
function buildTracker(){
  let h=buildActiveDisplay();
  // tag panel
  if(data.activeSession){
    if(!showTagInput){
      h+=`<button class="tag-add-btn" onclick="openTagInput()">+ Add tag</button>`;
    }else{
      const cid=data.activeSession.categoryId;
      const pool=poolFor(cid).filter(t=>!(data.activeSession.tags||[]).includes(t));
      h+=`<div class="tag-panel"><div class="tag-panel-title">Add tag</div>`;
      h+=`<div class="tag-input-row"><input class="inp" id="tag-in" type="text" placeholder="New tag or choose below…" onkeydown="if(event.key==='Enter'){event.preventDefault();addActiveTag();}"><button class="tag-set-btn" onclick="addActiveTag()">Add</button></div>`;
      if(pool.length)h+=`<div class="pool-chips" id="pool-chips-el">${pool.map(t=>`<button class="pool-chip" onclick="pickPoolTag('${esc(t)}')">${esc(t)}</button>`).join("")}</div>`;
      else h+=`<div id="pool-chips-el"></div>`;
      h+=`</div>`;
    }
  }
  h+=`<div class="cat-list">`;
  data.categories.forEach(cat=>{
    const isActive=data.activeSession?.categoryId===cat.id;
    h+=`<div class="cat-row"><button class="cat-btn${isActive?" active":""}" style="border-left-color:${cat.color}" onclick="startCat('${cat.id}')"><span style="font-weight:${isActive?500:400}">${esc(cat.name)}</span><div class="cat-btn-right">${isActive?`<span class="cat-hint">stop</span>`:""}<span class="cat-dot" style="background:${cat.color}"></span></div></button><button class="cat-rm" onclick="removeCat('${cat.id}')">×</button></div>`;
  });
  h+=`</div><div class="add-wrap">`;
  if(!addingCat){
    h+=`<button class="add-link" onclick="toggleAddCat()">+ Add category</button>`;
  }else{
    h+=`<div class="add-row"><input class="inp" id="new-cat-in" placeholder="Category name" onkeydown="newCatKey(event)" style="flex:1"><button class="sm-btn" onclick="submitCat()">Add</button><button class="sm-btn" onclick="toggleAddCat()">Cancel</button></div>`;
  }
  return h+`</div>`;
}

function openTagInput(){showTagInput=true;renderContent();setTimeout(()=>document.getElementById("tag-in")?.focus(),30);}

// ── build: insights ────────────────────────────────────────────────────────
function buildInsights(){
  const stats=getStats(period);
  const ss=getSessions(period);
  const total=Object.values(stats).reduce((a,b)=>a+b,0);
  const sorted=data.categories.map(c=>({...c,ms:stats[c.id]||0})).sort((a,b)=>b.ms-a.ms);
  const avg=getDailyAvg(period);
  const periods=["today","week","month","year","all time"];
  let h=`<div class="period-row">`;
  periods.forEach(p=>{h+=`<button class="period-btn${period===p?" active":""}" onclick="setPeriod('${p}')">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`;});
  h+=`<button class="export-btn" onclick="exportCSV()">Export CSV</button></div>`;
  h+=`<div class="summary-grid"><div class="sum-card"><div class="sum-label">${period==="today"?"today's total":"total tracked"}</div><div class="sum-val">${total>0?fmtMs(total):"–"}</div></div>`;
  if(avg)h+=`<div class="sum-card"><div class="sum-label">daily avg</div><div class="sum-val">${fmtMs(avg)}</div></div>`;
  h+=`</div>`;
  if(total>0){
    const sz=120;
    h+=`<div class="pie-wrap"><svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="flex-shrink:0;border-radius:50%;overflow:hidden">${makePie(sorted.map(c=>({v:c.ms,color:c.color})),sz)}</svg><div class="pie-legend">`;
    sorted.filter(c=>c.ms>0).forEach(c=>{h+=`<div class="pie-li"><span class="pie-sw" style="background:${c.color}"></span><span class="pie-name">${esc(c.name)}</span><span class="pie-val">${Math.round(c.ms/total*100)}%</span></div>`;});
    h+=`</div></div>`;
  }
  h+=`<div class="cat-bars">`;
  sorted.forEach(cat=>{
    const pct=total>0?Math.round(cat.ms/total*100):0;
    const ts=getTagStats(period,cat.id);
    h+=`<div><div class="bar-head"><span>${esc(cat.name)}${cat.ms>0?`<span class="bar-pct">${pct}%</span>`:""}</span><span class="bar-time">${cat.ms>0?fmtMs(cat.ms):"–"}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>`;
    if(ts.length){h+=`<div class="tag-bk">`;ts.forEach(([t,ms])=>{h+=`<div class="tag-bk-item"><span class="tag-bk-n">↳ ${esc(t)}</span><span class="tag-bk-v">${fmtMs(ms)}</span></div>`;});h+=`</div>`;}
    h+=`</div>`;
  });
  h+=`</div>`;
  const disp=ss.filter(s=>s.endTime);
  if(disp.length){
    h+=`<div class="sec-label">Sessions</div><div class="session-list">`;
    disp.slice(-25).reverse().forEach(s=>{
      const cat=data.categories.find(c=>c.id===s.categoryId);if(!cat)return;
      const dur=Math.floor((s.endTime-s.startTime)/1000);
      const d=new Date(s.startTime);
      const tStr=period==="today"?d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):`${d.toLocaleDateString([],{month:"short",day:"numeric"})} · ${d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}`;
      const isExp=expandedSid===s.id;
      const tagsList=s.tags||[];
      const nameStr=cat.name+(tagsList.length?" · "+tagsList.join(", "):"");
      h+=`<div class="s-item" style="border-left-color:${cat.color}">`;
      h+=`<div class="s-head" onclick="toggleSession('${s.id}')"><div class="s-main"><div class="s-name">${esc(nameStr)}</div><div class="s-time">${tStr}</div></div><span class="s-dur">${fmt(dur)}</span><span class="s-caret">${isExp?"▲":"▼"}</span></div>`;
      if(isExp){
        const pool=poolFor(s.categoryId).filter(t=>!tagsList.includes(t));
        h+=`<div class="s-edit"><div class="s-edit-chips">`;
        tagsList.forEach(t=>{h+=`<span class="s-chip">${esc(t)}<button class="s-chip-rm" onclick="removeSessionTag('${s.id}','${esc(t)}')">×</button></span>`;});
        if(!expandedAddingTag)h+=`<button class="s-add-btn" onclick="openSessionTagInput('${s.id}')">+ tag</button>`;
        h+=`</div>`;
        if(expandedAddingTag){
          h+=`<div class="s-tag-row"><input class="inp" id="sedit-in-${s.id}" placeholder="Add tag…" onkeydown="if(event.key==='Enter'){event.preventDefault();addSessionTag('${s.id}');}"><button class="sm-btn" onclick="addSessionTag('${s.id}')">Add</button><button class="sm-btn" onclick="closeSessionTagInput()">Done</button></div>`;
          if(pool.length)h+=`<div class="s-pool-chips">${pool.map(t=>`<button class="s-pool-chip" onclick="pickSessionPoolTag('${s.id}','${esc(t)}')">${esc(t)}</button>`).join("")}</div>`;
        }
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="empty">No sessions for this period</div>`;
  }
  return h;
}

// ── build: tags ────────────────────────────────────────────────────────────
function buildTags(){
  let h="";
  data.categories.forEach(cat=>{
    const pool=poolFor(cat.id);
    h+=`<div class="tags-cat-section"><div class="tags-cat-hd"><span class="tags-cat-dot" style="background:${cat.color}"></span><span class="tags-cat-name">${esc(cat.name)}</span></div>`;
    if(pool.length){
      h+=`<div class="tag-mgmt-list">`;
      pool.forEach(tag=>{
        const count=tagUseCount(cat.id,tag);
        h+=`<div class="tag-mgmt-item"><span class="tag-mgmt-name">${esc(tag)}</span><span class="tag-mgmt-count">${count} session${count!==1?"s":""}</span><button class="tag-mgmt-del" onclick="deletePoolTag('${esc(cat.id)}','${esc(tag)}')">×</button></div>`;
      });
      h+=`</div>`;
    }else{
      h+=`<div class="tags-empty">No tags yet.</div>`;
    }
    h+=`</div>`;
  });
  return h||`<div class="empty">No categories yet.</div>`;
}

// ── build: settings ────────────────────────────────────────────────────────
function buildSettings(){
  const connected=!!(token&&gistId);
  let h=`<div class="setup-card"><div class="setup-title">GitHub sync</div>`;
  if(connected){
    h+=`<div class="setup-desc">Connected. Data syncs automatically via a private GitHub Gist.</div><div class="setup-field"><label>Gist ID</label><input class="inp" value="${esc(gistId)}" readonly style="font-family:var(--mono);font-size:12px;color:var(--text3)"></div><div class="setup-actions"><button class="sm-btn" onclick="syncLoad()">Sync now</button><button class="danger-btn" onclick="disconnect()">Disconnect</button></div>`;
  }else{
    h+=`<div class="setup-desc">Connect GitHub to sync across devices. Stored in a <strong>private</strong> Gist only you can see.<br><br><strong>Steps:</strong><br>1. Go to <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens/new</a><br>2. Give it any name, e.g. "Time Tracker"<br>3. Check <strong>gist</strong> scope only<br>4. Generate token and paste below</div><div class="setup-field"><label>Personal Access Token</label><input class="inp" id="tok-in" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"></div><div id="setup-msg"></div><div class="setup-actions"><button class="primary-btn" id="conn-btn" onclick="doConnect()">Connect</button></div>`;
  }
  return h+`</div>`;
}

// ── ui handlers ────────────────────────────────────────────────────────────
function setPeriod(p){period=p;renderContent();}
function toggleSettings(){
  showSettings=!showSettings;
  renderTopbar();
  renderNav();
  renderContent();
}
function toggleAddCat(){addingCat=!addingCat;renderContent();if(addingCat)setTimeout(()=>document.getElementById("new-cat-in")?.focus(),30);}
function submitCat(){const v=document.getElementById("new-cat-in")?.value||"";if(v.trim()){addCat(v);addingCat=false;}}
function newCatKey(ev){if(ev.key==="Enter")submitCat();if(ev.key==="Escape"){addingCat=false;renderContent();}}
function toggleSession(id){expandedSid=expandedSid===id?null:id;expandedAddingTag=false;renderContent();}
function openSessionTagInput(sid){expandedAddingTag=true;renderContent();setTimeout(()=>document.getElementById("sedit-in-"+sid)?.focus(),30);}
function closeSessionTagInput(){expandedAddingTag=false;renderContent();}

async function doConnect(){
  const tok=(document.getElementById("tok-in")?.value||"").trim();
  const msgEl=document.getElementById("setup-msg"),btn=document.getElementById("conn-btn");
  if(!tok){msgEl.innerHTML=`<div class="fl-msg error">Please enter a token.</div>`;return;}
  btn.disabled=true;btn.textContent="Connecting…";
  try{
    token=tok;gistId=await findOrCreate();
    localStorage.setItem(TKEY,token);localStorage.setItem(GKEY,gistId);
    await syncLoad();showSettings=false;
    renderTopbar();renderNav();renderContent();
  }catch(ex){
    token="";gistId="";
    msgEl.innerHTML=`<div class="fl-msg error">Failed: ${esc(ex.message)}</div>`;
    btn.disabled=false;btn.textContent="Connect";
  }
}
function disconnect(){
  if(!confirm("Disconnect? Local data stays."))return;
  token="";gistId="";
  localStorage.removeItem(TKEY);localStorage.removeItem(GKEY);
  renderTopbar();renderContent();
}

// ── clock tick ─────────────────────────────────────────────────────────────
setInterval(()=>{
  if(!data.activeSession||view!=="tracker"||showSettings)return;
  const el=document.getElementById("timer-el");
  if(el)el.textContent=fmt(Math.floor((Date.now()-data.activeSession.startTime)/1000));
},1000);

// ── init ───────────────────────────────────────────────────────────────────
(function(){
  try{
    const saved=lload();
    if(saved&&saved.categories)data=saved;
  }catch(e){console.warn("load error",e);}
  token=localStorage.getItem(TKEY)||"";
  gistId=localStorage.getItem(GKEY)||"";
  renderTopbar();
  renderNav();
  renderContent();
  if(token&&gistId)syncLoad();
})();
</script>
